version: 5
mqtt:
  base_topic: zigbee2mqtt
  server: mqtt://YOUR_EC2_IP:1883   # AWS EC2 MQTT Broker
serial:
  port: /dev/ttyACM0                   # ZBDongle-P USB port บน Pi Zero 2W
advanced:
  log_level: info
  channel: 11
  network_key: GENERATE
  pan_id: GENERATE
  ext_pan_id: GENERATE
frontend:
  enabled: true
  port: 8080
homeassistant:
  enabled: true                        # เปิด HA auto-discovery ผ่าน MQTT
onboarding: false
