      # ── Hero: Project Identity ──────────────────────────
      - type: markdown
        content: |
          # 🏠 Smart Home AIoT

          ### ชาวี (Chawi) — ผู้ช่วยบ้านอัจฉริยะภาษาไทย

          > *"ออกแบบเพื่อใช้งานจริง 24/7 บนระบบ Cloud-first — ปิดคอมไม่กระทบ"*

          ---

          | | |
          |---|---|
          | 👨‍🎓 **Project** | Senior Project — CE08 |
          | 🗓️ **Defense** | 26 พฤษภาคม 2026 |
          | 🌐 **Hosted** | AWS EC2 (us-east-1) + Railway + Pi 3B+ Edge |
          | 🔌 **Status** | Production-ready · 24/7 cloud uptime |

      # ── Abstract ────────────────────────────────────────
      - type: markdown
        content: |
          ## 📋 Project Abstract

          **Smart Home AIoT** คือระบบบ้านอัจฉริยะที่ผสาน **5 ESP32 zones**
          (Wi-Fi-based sensors/actuators) เข้ากับ **Zigbee mesh** ผ่าน
          Raspberry Pi 3B+ + Sonoff ZBDongle-E + Zigbee2MQTT — แล้วเปิดให้
          ผู้ใช้งานสั่งงานผ่าน **LINE bot ภาษาไทย "ชาวี"** ที่ใช้ LLaMA 3.3 70B
          วิเคราะห์ intent โดยอัตโนมัติ

          ### 🎯 ปัญหาที่แก้ / Problem Statement

          - บ้านส่วนใหญ่ใช้ smart device คนละแบรนด์ — ต้องเปิดหลาย app
          - AI assistant สำเร็จรูปไม่เข้าใจภาษาไทยธรรมชาติ
          - การ monitor บ้านระยะไกลต้องเปิดคอมตลอด
          - ผู้สูงอายุล้มในห้องน้ำ/ห้องนอนแล้วไม่มีใครรู้ทันที

          ### ✅ Solution Highlights

          - **One bot, one conversation** — ชาวี เป็น face เดียวสำหรับ ESP32 + Zigbee + Alexa
          - **Thai-first NLP** — Groq LLaMA 3.3 70B วิเคราะห์ intent ภาษาไทย
          - **Cloud-first** — AWS EC2 + Railway → ปิด Mac ระบบทำงานต่อ
          - **Multi-channel** — LINE + Alexa voice + HA mobile app + Web dashboard
          - **Safety-first** — Fall detect, gas/water leak, smoke → auto-action + LINE alert

      # ── Architecture ────────────────────────────────────
      - type: markdown
        content: |
          ## 🏗️ System Architecture

          ```
          ┌──────────── PHYSICAL HOUSE (Model) ────────────┐
          │                                                 │
          │  ESP32 ×5 ──────┐      ┌──── Zigbee Devices    │
          │  (Wi-Fi MQTT)   │      │      (Mesh, 2.4GHz)   │
          │                 ▼      ▼                        │
          │           Pi 3B+ + ZBDongle-E                   │
          │           (Zigbee2MQTT Docker)                  │
          │                  │                              │
          └──────────────────┼──────────────────────────────┘
                             │ MQTT (over Wi-Fi/Internet)
                             ▼
          ┌──────────────── CLOUD LAYER ────────────────────┐
          │                                                  │
          │   AWS EC2 t3.small (us-east-1) — 3.90.44.234    │
          │   ├─ Home Assistant 2026.4.2                     │
          │   ├─ Mosquitto MQTT broker (1883)                │
          │   └─ 13 automation rules                         │
          │              │                                   │
          │              ├──► Railway n8n ──► Groq LLaMA    │
          │              │    (3 workflows)    3.3 70B AI    │
          │              │                                   │
          │              ├──► LINE Messaging API → ชาวี Bot │
          │              │                                   │
          │              ├──► AWS Lambda → Alexa Custom Skill│
          │              │                                   │
          │              └──► Supabase PostgreSQL           │
          │                   (chat logs, sensor history)    │
          └──────────────────────────────────────────────────┘
          ```

