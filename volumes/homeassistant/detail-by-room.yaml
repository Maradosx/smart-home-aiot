title: Smart Home AIoT
views:

  # ════════════════════════════════════════════════════════════
  # 1. หน้าหลัก / Overview
  # ════════════════════════════════════════════════════════════
  - title: ภาพรวม
    path: overview
    icon: mdi:home-automation
    badges: []
    cards:
      - type: vertical-stack
        cards:
          - type: markdown
            content: |
              # 🏠 Smart Home AIoT
              **ชาวี (Chawi)** — ผู้ช่วยบ้านอัจฉริยะ AI ภาษาไทย

          - type: horizontal-stack
            cards:
              - type: entities
                title: 🎛️ Mode Control
                show_header_toggle: false
                entities:
                  - entity: input_select.house_mode
                    name: House Mode
                  - entity: input_select.comfort_mode
                    name: Comfort Mode
              - type: weather-forecast
                entity: weather.forecast_baan
                show_forecast: true

          - type: entities
            title: 🚨 Active Alerts
            show_header_toggle: false
            entities:
              - entity: binary_sensor.kitchen_gas_alert
                name: แจ้งแก๊สรั่ว / Gas Alert
              - entity: binary_sensor.bathroom_water_leak
                name: น้ำรั่ว / Water Leak
              - entity: binary_sensor.bathroom_fall_alert
                name: คนล้มห้องน้ำ / Bathroom Fall
              - entity: binary_sensor.bedroom_fall_alert
                name: คนล้มห้องนอน / Bedroom Fall
              - entity: binary_sensor.living_room_air_alert
                name: อากาศเสีย / Air Alert
              - entity: binary_sensor.garage_smoke_alert
                name: ควัน/แก๊สโรงรถ / Garage Smoke
              - entity: binary_sensor.front_door
                name: ประตูหน้า / Front Door

          - type: glance
            title: 🌡️ Temperature ทุกห้อง
            show_state: true
            columns: 4
            entities:
              - entity: sensor.bedroom_temperature
                name: ห้องนอน
              - entity: sensor.living_room_temperature
                name: ห้องนั่งเล่น
              - entity: sensor.kitchen_temperature
                name: ครัว
              - entity: weather.forecast_baan
                name: ภายนอก

          - type: glance
            title: 💧 Humidity ทุกห้อง
            show_state: true
            columns: 4
            entities:
              - entity: sensor.bedroom_humidity
                name: ห้องนอน
              - entity: sensor.living_room_humidity
                name: ห้องนั่งเล่น
              - entity: sensor.kitchen_humidity
                name: ครัว
              - entity: sensor.garden_soil_moisture
                name: ดินสวน

      - type: vertical-stack
        cards:
          - type: entities
            title: 💡 Lights ทั้งหมด (quick toggle)
            show_header_toggle: true
            entities:
              - entity: switch.bedroom_light
                name: ห้องนอน
              - entity: light.living_room_light
                name: ห้องนั่งเล่น (Zigbee)
              - entity: switch.kitchen_light
                name: ครัว
              - entity: switch.bathroom_light
                name: ห้องน้ำ
              - entity: switch.garden_light_1
                name: สวน 1
              - entity: switch.garden_light_2
                name: สวน 2
              - entity: switch.garage_light
                name: โรงรถ
              - entity: switch.garage_pathway_light
                name: ทางเดิน

          - type: entities
            title: 🌪️ Fans + Pumps
            show_header_toggle: false
            entities:
              - entity: switch.bedroom_fan
                name: พัดลมห้องนอน
              - entity: switch.living_room_air_purifier
                name: เครื่องฟอกอากาศ (รอ Tuya plug #2)
                icon: mdi:air-purifier
                secondary_info: last-updated
              - type: section
                label: ── พัดลม ──
              - entity: switch.living_room_fan
                name: พัดลมห้องนั่งเล่น
              - entity: switch.kitchen_fan
                name: พัดลมระบายอากาศครัว
              - entity: switch.kitchen_stove
                name: เตาแก๊ส
              - entity: switch.garden_water_pump
                name: ปั๊มรดน้ำ

          - type: entities
            title: 🚪 Doors + Covers
            entities:
              - entity: cover.bedroom_curtain
                name: ม่านห้องนอน
              - entity: cover.garage_door
                name: ประตูโรงรถ
              - entity: lock.front_door_lock
                name: ล็อคประตูหน้า

          - type: entities
            title: 📡 Zigbee Bridge
            entities:
              - entity: binary_sensor.zigbee2mqtt_bridge_connection_state
                name: Connection
              - entity: sensor.zigbee2mqtt_bridge_version
                name: Z2M Version
              - entity: switch.zigbee2mqtt_bridge_permit_join
                name: Permit Join

  # ════════════════════════════════════════════════════════════
  # 2. ห้องนอน / Bedroom
  # ════════════════════════════════════════════════════════════
  - title: ห้องนอน
    path: bedroom
    icon: mdi:bed
    cards:
      - type: vertical-stack
        cards:
          - type: markdown
            content: |
              ## 🛏️ ห้องนอน / Bedroom
              ESP32 #1 — DHT22 + LD2410C mmWave + Servo + LDR + LED + Relay Fan

          - type: horizontal-stack
            cards:
              - type: gauge
                entity: sensor.bedroom_temperature
                name: อุณหภูมิ
                unit: °C
                min: 15
                max: 40
                severity:
                  green: 22
                  yellow: 28
                  red: 32
              - type: gauge
                entity: sensor.bedroom_humidity
                name: ความชื้น
                unit: '%'
                min: 0
                max: 100
                severity:
                  green: 40
                  yellow: 60
                  red: 75

          - type: entities
            title: 👤 Presence & Motion
            entities:
              - entity: binary_sensor.bedroom_presence
                name: คนอยู่ในห้อง (mmWave)
              - entity: binary_sensor.bedroom_presence
                name: การเคลื่อนไหว
              - entity: binary_sensor.bedroom_fall_alert
                name: แจ้งคนล้ม
              - entity: sensor.bedroom_ldr
                name: ระดับแสง

      - type: vertical-stack
        cards:
          - type: entities
            title: 💡 Actuators
            show_header_toggle: false
            entities:
              - entity: switch.bedroom_light
                name: ไฟห้องนอน
                icon: mdi:lightbulb
              - entity: switch.bedroom_fan
                name: พัดลม
                icon: mdi:fan
              - entity: cover.bedroom_curtain
                name: ผ้าม่าน
                icon: mdi:curtains

  # ════════════════════════════════════════════════════════════
  # 3. ห้องนั่งเล่น / Living Room
  # ════════════════════════════════════════════════════════════
  - title: ห้องนั่งเล่น
    path: living-room
    icon: mdi:sofa
    cards:
      - type: vertical-stack
        cards:
          - type: markdown
            content: |
              ## 🛋️ ห้องนั่งเล่น / Living Room
              ESP32 #2 — DHT22 + MQ-135 + LDR
              **Zigbee:** Tuya RGB+CCT bulb + Tuya plug ×2 + SNZB-03P motion

          - type: horizontal-stack
            cards:
              - type: gauge
                entity: sensor.living_room_temperature
                name: อุณหภูมิ
                unit: °C
                min: 15
                max: 40
                severity:
                  green: 22
                  yellow: 28
                  red: 32
              - type: gauge
                entity: sensor.living_room_humidity
                name: ความชื้น
                unit: '%'
                min: 0
                max: 100
                severity:
                  green: 40
                  yellow: 60
                  red: 75

          - type: entities
            title: 🌬️ Air Quality
            entities:
              - entity: sensor.living_room_air_quality
                name: คุณภาพอากาศ
              - entity: binary_sensor.living_room_air_alert
                name: แจ้งอากาศเสีย
              - entity: sensor.living_room_ldr
                name: ระดับแสง
              - entity: binary_sensor.living_room_motion
                name: การเคลื่อนไหว (Zigbee)

      - type: vertical-stack
        cards:
          - type: light
            entity: light.living_room_light
            name: ไฟห้องนั่งเล่น (Tuya RGB+CCT)

          - type: entities
            title: 🔌 Smart Plugs (Zigbee)
            show_header_toggle: false
            entities:
              - entity: switch.living_room_air_purifier
                name: เครื่องฟอกอากาศ (รอ Tuya plug #2)
                icon: mdi:air-purifier
                secondary_info: last-updated
              - type: section
                label: ── พัดลม ──
              - entity: switch.living_room_fan
                name: พัดลม
                icon: mdi:fan
              - type: section
                label: Power Monitoring (พัดลม)
              - entity: sensor.living_room_fan_power
                name: Power
              - entity: sensor.living_room_fan_voltage
                name: Voltage
              - entity: sensor.living_room_fan_current
                name: Current
              - entity: sensor.living_room_fan_energy
                name: Energy

          # ─── Front Door Lock (SG90 180° servo บน ESP32 #2 / GPIO13) ───
          - type: markdown
            content: |
              ## 🚪 ประตูหน้า / Front Door Lock
              _SG90 servo 180° บน ESP32 #2 (GPIO13) · UNLOCK=0° ↔ LOCK=90°_

          - type: horizontal-stack
            cards:
              - type: button
                entity: lock.front_door_lock
                name: ล็อคประตู
                icon: mdi:lock
                icon_height: 48px
                show_state: false
                tap_action:
                  action: call-service
                  service: lock.lock
                  service_data:
                    entity_id: lock.front_door_lock
                hold_action:
                  action: more-info

              - type: button
                entity: lock.front_door_lock
                name: ปลดล็อค
                icon: mdi:lock-open-variant
                icon_height: 48px
                show_state: false
                tap_action:
                  action: call-service
                  service: lock.unlock
                  service_data:
                    entity_id: lock.front_door_lock
                hold_action:
                  action: more-info

          - type: entities
            title: 🔐 สถานะประตู
            show_header_toggle: false
            entities:
              - entity: lock.front_door_lock
                name: สถานะล็อค
                icon: mdi:door
              - entity: binary_sensor.front_door
                name: ประตูเปิด/ปิด (Zigbee DS01)
                icon: mdi:door-closed

          - type: markdown
            content: |
              ## 🎆 Light Effects
              **🟢 Auto-trigger** = ทำงานเอง · **⚪ Manual** = ต้องกดเอง
              สถานะ **ON** = กำลังทำงาน · **OFF** = ว่าง · tap card = trigger ทันที

          - type: grid
            columns: 2
            square: false
            cards:
              # ── Red Flash (auto on gas/smoke) ──
              - type: tile
                entity: script.living_room_red_flash
                name: 🚨 Red Flash
                color: red
                tap_action:
                  action: call-service
                  service: script.living_room_red_flash
                features_position: bottom
                vertical: false
                hide_state: false
                state_content:
                  - state
                  - last-triggered
                icon: mdi:alert-circle-outline

              # ── Blue Pulse (auto on water leak) ──
              - type: tile
                entity: script.living_room_blue_pulse
                name: 💧 Blue Pulse
                color: blue
                tap_action:
                  action: call-service
                  service: script.living_room_blue_pulse
                state_content:
                  - state
                  - last-triggered
                icon: mdi:water-pump

              # ── Welcome Home (auto on GPS) ──
              - type: tile
                entity: script.living_room_welcome_home
                name: 🏠 Welcome Home
                color: amber
                tap_action:
                  action: call-service
                  service: script.living_room_welcome_home
                state_content:
                  - state
                  - last-triggered
                icon: mdi:home-heart

              # ── Sunrise (auto 06:00) ──
              - type: tile
                entity: script.living_room_sunrise
                name: 🌅 Sunrise
                color: orange
                tap_action:
                  action: call-service
                  service: script.living_room_sunrise
                state_content:
                  - state
                  - last-triggered
                icon: mdi:weather-sunset-up

              # ── Party ON (manual) ──
              - type: tile
                entity: script.living_room_party_on
                name: 🎉 Party ON
                color: pink
                tap_action:
                  action: call-service
                  service: script.living_room_party_on
                state_content:
                  - state
                  - last-triggered
                icon: mdi:party-popper

              # ── Party OFF (manual) ──
              - type: tile
                entity: script.living_room_party_off
                name: 🛑 Party OFF
                color: grey
                tap_action:
                  action: call-service
                  service: script.living_room_party_off
                state_content:
                  - state
                  - last-triggered
                icon: mdi:stop-circle-outline

          - type: entities
            title: 🤖 Auto-trigger Hooks (เปิด/ปิดได้)
            show_header_toggle: false
            entities:
              - entity: automation.gas_alert_auto_vent_fan_on
                name: 🚨 Gas Alert → Red Flash + Vent fan
                secondary_info: last-triggered
              - entity: automation.water_leak_line_alert
                name: 💧 Water Leak → Blue Pulse + LINE
                secondary_info: last-triggered
              - entity: automation.garage_smoke_alert_line_alert
                name: 🔥 Garage Smoke → Red Flash + LINE
                secondary_info: last-triggered
              - entity: automation.gps_klabbaan_home_mode
                name: 🏠 GPS Home → Welcome scene
                secondary_info: last-triggered
              - entity: automation.daily_sunrise_wake_up_at_06_00
                name: 🌅 Daily Sunrise (06:00)
                secondary_info: last-triggered
              - entity: automation.living_room_light_mode_scene
                name: 🎨 Mood Scene (on mode change)
                secondary_info: last-triggered

          - type: entities
            title: 🎨 Mode Selectors (เปลี่ยน mood)
            entities:
              - entity: input_select.house_mode
                name: House Mode
              - entity: input_select.comfort_mode
                name: Comfort Mode

          - type: entities
            title: 📡 Zigbee Signal
            entities:
              - entity: sensor.livingroom_pir_battery
                name: Motion Battery
              - entity: binary_sensor.front_door
                name: ประตูหน้าบ้าน Front Door

  # ════════════════════════════════════════════════════════════
  # 4. ประตูหน้า / Front Door
  # ════════════════════════════════════════════════════════════
  - title: ประตูหน้า
    path: front-door
    icon: mdi:door
    cards:
      - type: vertical-stack
        cards:
          - type: markdown
            content: |
              ## 🚪 ประตูหน้า / Front Door
              **SNZB-04** door contact sensor (Zigbee — pending pair)
              **Servo SG90 180°** lock (planned — host on ESP32 #2)

          - type: entities
            title: 🚪 Status & Control
            entities:
              - entity: binary_sensor.front_door
                name: ประตูเปิด/ปิด
                secondary_info: last-changed
              - entity: lock.front_door_lock
                name: ล็อค/ปลดล็อค
                secondary_info: last-changed

          - type: history-graph
            title: ประวัติ 24 ชม.
            hours_to_show: 24
            entities:
              - entity: binary_sensor.front_door
              - entity: lock.front_door_lock

  # ════════════════════════════════════════════════════════════
  # 5. ห้องครัว / Kitchen
  # ════════════════════════════════════════════════════════════
  - title: ห้องครัว
    path: kitchen
    icon: mdi:stove
    cards:
      - type: vertical-stack
        cards:
          - type: markdown
            content: |
              ## 🍳 ห้องครัว / Kitchen
              ESP32 #3 — DHT22 + MQ-2 (LPG/smoke) + LDR + LED + Relay×2 (Stove + Fan)

          - type: horizontal-stack
            cards:
              - type: gauge
                entity: sensor.kitchen_temperature
                name: อุณหภูมิ
                unit: °C
                min: 15
                max: 50
                severity:
                  green: 22
                  yellow: 30
                  red: 40
              - type: gauge
                entity: sensor.kitchen_humidity
                name: ความชื้น
                unit: '%'

          - type: entities
            title: 🚨 Gas Detection
            entities:
              - entity: binary_sensor.kitchen_gas_alert
                name: แจ้งแก๊สรั่ว
                icon: mdi:gas-cylinder
              - entity: sensor.kitchen_gas_lpg
                name: เซ็นเซอร์ LPG (raw)
              - entity: sensor.kitchen_ldr
                name: ระดับแสง

      - type: vertical-stack
        cards:
          - type: entities
            title: 🍳 Actuators
            show_header_toggle: false
            entities:
              - entity: switch.kitchen_light
                name: ไฟครัว
                icon: mdi:lightbulb
              - entity: switch.kitchen_stove
                name: เตาแก๊ส (จำลอง)
                icon: mdi:stove
              - entity: switch.kitchen_fan
                name: พัดลมระบายอากาศ
                icon: mdi:fan

  # ════════════════════════════════════════════════════════════
  # 6. ห้องน้ำ / Bathroom
  # ════════════════════════════════════════════════════════════
  - title: ห้องน้ำ
    path: bathroom
    icon: mdi:shower
    cards:
      - type: vertical-stack
        cards:
          - type: markdown
            content: |
              ## 🛁 ห้องน้ำ / Bathroom
              ESP32 #4 (shared with Garden) — DHT22 + LD2410C (fall) + LDR + LED
              **Zigbee:** SONOFF SNZB-05P water leak

          - type: entities
            title: 👤 Presence & Safety
            entities:
              - entity: binary_sensor.bathroom_presence
                name: คนอยู่ในห้องน้ำ
              - entity: binary_sensor.bathroom_fall_alert
                name: แจ้งคนล้ม (5 นาที stationary)
                icon: mdi:alert
              - entity: sensor.bathroom_ldr
                name: ระดับแสง

          - type: entities
            title: 💧 Water Leak (Zigbee)
            entities:
              - entity: binary_sensor.bathroom_water_leak
                name: ตรวจน้ำรั่ว
                icon: mdi:water-alert
              - entity: sensor.bathroom_water_leak_battery
                name: Battery
              - entity: sensor.bathroom_water_leak_battery
                name: Link Quality

      - type: vertical-stack
        cards:
          - type: entities
            title: 💡 Actuators
            entities:
              - entity: switch.bathroom_light
                name: ไฟห้องน้ำ
                icon: mdi:lightbulb

  # ════════════════════════════════════════════════════════════
  # 7. สวน / Garden
  # ════════════════════════════════════════════════════════════
  - title: สวน
    path: garden
    icon: mdi:flower
    cards:
      - type: vertical-stack
        cards:
          - type: markdown
            content: |
              ## 🌿 สวน / Garden
              ESP32 #4 (shared with Bathroom) — Capacitive Soil Moisture + LDR (GPIO39) + Relay Pump + LED ×2

          - type: gauge
            entity: sensor.garden_soil_moisture
            name: ความชื้นดิน
            unit: '%'
            min: 0
            max: 100
            severity:
              red: 0
              yellow: 30
              green: 50

          - type: entities
            title: 🌱 Sensors
            entities:
              - entity: sensor.garden_soil_moisture
                name: ความชื้นดิน / Soil Moisture
              - entity: sensor.garden_soil_raw
                name: Soil Raw ADC
              - entity: sensor.garden_ldr
                name: แสงสวน / Light Level

      - type: vertical-stack
        cards:
          - type: entities
            title: 💧 Watering
            entities:
              - entity: switch.garden_water_pump
                name: ปั๊มรดน้ำ
                icon: mdi:water-pump

          - type: entities
            title: 💡 ไฟสวน (Garden Lights)
            show_header_toggle: false
            entities:
              # Master toggle — เปิด/ปิด ไฟสวน 1+2 พร้อมกัน
              - entity: switch.garden_lights
                name: 💡 ไฟสวนทั้งหมด (Master)
                icon: mdi:lightbulb-group
                secondary_info: last-changed
              - type: divider
              - entity: switch.garden_light_1
                name: ไฟสวน 1
                icon: mdi:outdoor-lamp
              - entity: switch.garden_light_2
                name: ไฟสวน 2
                icon: mdi:outdoor-lamp

  # ════════════════════════════════════════════════════════════
  # 8. โรงรถ / Garage
  # ════════════════════════════════════════════════════════════
  - title: โรงรถ
    path: garage
    icon: mdi:garage
    cards:
      - type: vertical-stack
        cards:
          - type: markdown
            content: |
              ## 🚗 โรงรถ / Garage
              ESP32 #5 — PIR HC-SR501 + MQ-2 + LDR + Servo SG90 180° + LED ×2

          - type: entities
            title: 🚶 Motion & Smoke
            entities:
              - entity: binary_sensor.garage_motion
                name: การเคลื่อนไหว (PIR)
              - entity: binary_sensor.garage_smoke_alert
                name: แจ้งควัน/แก๊ส (MQ-2)
                icon: mdi:smoke
              - entity: sensor.garage_smoke_lpg
                name: LPG Level
              - entity: sensor.garage_ldr
                name: ระดับแสง

      - type: vertical-stack
        cards:
          - type: tile
            entity: cover.garage_door
            name: ประตูโรงรถ
            features:
              - type: cover-open-close
              - type: cover-position

          - type: entities
            title: 💡 Lights
            show_header_toggle: true
            entities:
              - entity: switch.garage_light
                name: ไฟโรงรถ
                icon: mdi:lightbulb
              - entity: switch.garage_pathway_light
                name: ไฟทางเดิน
                icon: mdi:outdoor-lamp

  # ════════════════════════════════════════════════════════════
  # 9. กราฟ / Charts
  # ════════════════════════════════════════════════════════════
  - title: กราฟ
    path: charts
    icon: mdi:chart-line
    cards:
      - type: history-graph
        title: 🌡️ Temperature (24h)
        hours_to_show: 24
        entities:
          - entity: sensor.bedroom_temperature
            name: ห้องนอน
          - entity: sensor.living_room_temperature
            name: ห้องนั่งเล่น
          - entity: sensor.kitchen_temperature
            name: ครัว

      - type: history-graph
        title: 💧 Humidity (24h)
        hours_to_show: 24
        entities:
          - entity: sensor.bedroom_humidity
          - entity: sensor.living_room_humidity
          - entity: sensor.kitchen_humidity

      - type: history-graph
