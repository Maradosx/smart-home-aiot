      # ── Features ────────────────────────────────────────
      - type: markdown
        content: |
          ## ✨ Key Features

          ### 🤖 AI Assistant — "ชาวี"
          - เข้าใจภาษาไทยธรรมชาติ — *"เปิดไฟห้องนั่งเล่น"*, *"อากาศห้องเป็นไง?"*, *"สวนแห้งมั้ย"*
          - 2-turn conversation memory (persistent ใน Supabase)
          - 13 automation rules ทำงานอัตโนมัติ
          - Quick Reply 6 ปุ่ม + Rich Menu 12 ปุ่ม บน LINE

          ### 🛡️ Safety & Security
          - 🔥 **Gas leak detection** — MQ-2 ครัว/โรงรถ → auto-open vent fan + LINE alert
          - 💧 **Water leak detection** — Zigbee SNZB-05P ห้องน้ำ → LINE alert ทันที
          - 🏃 **Fall detection** — LD2410C ห้องน้ำ/ห้องนอน (5 นาที stationary) → LINE alert + emergency
          - 🚪 **Front door monitoring** — เปิดค้าง > 1 นาที → LINE alert
          - 🌫️ **Air quality** — MQ-135 ห้องนั่งเล่น สูง → เปิดเครื่องฟอกอากาศอัตโนมัติ

          ### 🌬️ Climate & Comfort
          - Auto-fan based on อุณหภูมิ DHT22
          - Auto-curtain ตามเวลา + LDR (เช้าเปิด เย็นปิด)
          - Multi-color smart lighting — เปลี่ยนสี/ความสว่างผ่าน Zigbee Tuya bulb
          - Comfort Mode presets: Normal / Sleep / Movie / Away

          ### 🌱 Garden Automation
          - Auto-water pump เมื่อ Capacitive Soil < 30%
          - Garden lights ตาม LDR (sunset → on, sunrise → off)

          ### 📊 Multi-Platform Control
          1. **LINE bot "ชาวี"** (primary) — Thai NLP + memory
          2. **Home Assistant mobile app** — full control + maps + notifications
          3. **Amazon Alexa** — *"Alexa, open smart home"* → voice commands
          4. **Web dashboard** (this UI) — Sections layout + per-room details
          5. **Direct MQTT** — for developers/debug

