      # ── Hardware Zones ──────────────────────────────────
      - type: markdown
        content: |
          ## 🏠 Hardware Zones (7 zones)

          | Zone | Sensors | Actuators | Zigbee |
          |---|---|---|---|
          | 🛏️ **ห้องนอน** | DHT22 · LD2410C · LDR | Servo curtain · Fan · LED | — |
          | 🛋️ **ห้องนั่งเล่น** | DHT22 · MQ-135 · LDR | (LED deprecated) | Bulb · Plug ×2 · Motion |
          | 🚪 **ประตูหน้า** | (planned) | Servo SG90 (planned) | SNZB-04 (planned) |
          | 🍳 **ห้องครัว** | DHT22 · MQ-2 · LDR | LED · Relay ×2 (stove + fan) | — |
          | 🛁 **ห้องน้ำ** | DHT22 · LD2410C · LDR | LED | SNZB-05P (water leak) |
          | 🌿 **สวน** | Soil moisture · LDR | Water pump · LED ×2 | — |
          | 🚗 **โรงรถ** | PIR · MQ-2 · LDR | Servo door · LED ×2 | — |

          ### 📊 รวมอุปกรณ์ทั้งระบบ

          - **5 ESP32** boards + **1 Pi 3B+** = 6 microcontrollers/SBCs
          - **20 sensors** (DHT22, MQ-2/135, LD2410C, PIR, LDR, Soil, etc.)
          - **14 actuators** (LED ×8, Relay ×5, Servo ×3, Pump ×1)
          - **6 Zigbee devices** (Tuya + Sonoff)
          - = **40+ smart endpoints**

