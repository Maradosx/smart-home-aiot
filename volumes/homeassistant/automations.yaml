- id: pump_auto_on_when_dry
  alias: "\U0001F331 Pump - Auto ON (dry + daytime + not raining)"
  description: ดินแห้ง <45% + กลางวัน + ไม่ฝน → เปิดปั๊ม (template trigger fires when
    conditions met)
  triggers:
  - platform: numeric_state
    entity_id: sensor.garden_soil_moisture
    below: 45
  - platform: template
    value_template: '{{ states(''sensor.garden_soil_moisture'') | int(0) < 45 and
      states(''switch.garden_water_pump'') == ''off'' }}'
  conditions:
  - condition: state
    entity_id: switch.garden_water_pump
    state: 'off'
  - condition: time
    after: 06:00:00
    before: '20:00:00'
  - condition: template
    value_template: '{{ states(''weather.forecast_baan'') not in [''rainy'',''pouring'',''lightning-rainy'',''lightning'']
      }}'
  actions:
  - action: switch.turn_on
    target:
      entity_id: switch.garden_water_pump
  mode: single
- id: pump_auto_off_when_wet
  alias: "\U0001F331 Pump - Auto OFF (moisture target reached)"
  description: ดินชื้นถึง 60% → ปิดปั๊ม (target reached)
  triggers:
  - platform: numeric_state
    entity_id: sensor.garden_soil_moisture
    above: 60
  conditions:
  - condition: state
    entity_id: switch.garden_water_pump
    state: 'on'
  actions:
  - target:
      entity_id: switch.garden_water_pump
    action: switch.turn_off
  mode: single
- id: pump_safety_max_runtime
  alias: "\U0001F6A8 Pump - Safety Max Runtime (10 min)"
  description: 'Safety: ถ้าปั๊มเปิดนาน 10 นาที → force off + alert (กันท่วม)'
  triggers:
  - platform: state
    entity_id: switch.garden_water_pump
    to: 'on'
    for:
      minutes: 10
  actions:
  - target:
      entity_id: switch.garden_water_pump
    action: switch.turn_off
  - data:
      title: "\U0001F6A8 Pump Safety Cutoff"
      message: ปั๊มน้ำเปิดเกิน 10 นาที → ตัดให้อัตโนมัติ ตรวจสอบ soil sensor!
      data:
        push:
          sound: alarm.caf
          interruption-level: critical
    action: notify.mobile_app_maradosx
  - data:
      title: "\U0001F6A8 Pump Safety Cutoff"
      message: ปั๊มเปิดเกิน 10 นาที — ตัดอัตโนมัติ ตรวจสอบ soil sensor
      notification_id: pump_safety
    action: persistent_notification.create
  - data:
      alert_type: pump_done
      value: SAFETY_CUTOFF_10MIN
      room: garden
    action: rest_command.send_alert
  mode: single
- id: party_button_to_loop
  alias: "\U0001F389 Party Button → Start Loop"
  description: When dashboard/ชาวี calls party_on script → activate party_loop_active
    for our automation to drive color loop
  triggers:
  - platform: state
    entity_id: script.living_room_party_on
    to: 'on'
  actions:
  - action: input_boolean.turn_on
    data:
      entity_id: input_boolean.party_loop_active
  mode: single
- id: party_off_button_to_loop_stop
  alias: "\U0001F6D1 Party Off Button → Stop Loop"
  triggers:
  - platform: state
    entity_id: script.living_room_party_off
    to: 'on'
  actions:
  - action: input_boolean.turn_off
    data:
      entity_id: input_boolean.party_loop_active
  - action: light.turn_on
    data:
      entity_id: light.living_room_light
      color_temp_kelvin: 3000
      brightness_pct: 80
      transition: 1
  mode: single
- id: party_loop_executor
  alias: "\U0001F3A8 Party Loop Executor (color cycle)"
  description: While party_loop_active is on → cycle through 5 vibrant colors continuously
  triggers:
  - platform: state
    entity_id: input_boolean.party_loop_active
    to: 'on'
  actions:
  - repeat:
      while:
      - condition: state
        entity_id: input_boolean.party_loop_active
        state: 'on'
      sequence:
      - action: light.turn_on
        data:
          entity_id: light.living_room_light
          rgb_color:
          - 255
          - 20
          - 147
          brightness_pct: 100
      - delay:
          milliseconds: 700
      - action: light.turn_on
        data:
          entity_id: light.living_room_light
          rgb_color:
          - 0
          - 255
          - 255
          brightness_pct: 100
      - delay:
          milliseconds: 700
      - action: light.turn_on
        data:
          entity_id: light.living_room_light
          rgb_color:
          - 255
          - 255
          - 0
          brightness_pct: 100
      - delay:
          milliseconds: 700
      - action: light.turn_on
        data:
          entity_id: light.living_room_light
          rgb_color:
          - 148
          - 0
          - 211
          brightness_pct: 100
      - delay:
          milliseconds: 700
      - action: light.turn_on
        data:
          entity_id: light.living_room_light
          rgb_color:
          - 0
          - 255
          - 0
          brightness_pct: 100
      - delay:
          milliseconds: 700
  mode: restart
- id: alert_flash_executor
  alias: "\U0001F6A8 Alert Flash - Red Blink Loop"
  description: Blink red forever while alert_flash_active=on. Press again to stop.
  triggers:
  - platform: state
    entity_id: input_boolean.alert_flash_active
    to: 'on'
  actions:
  - repeat:
      while:
      - condition: state
        entity_id: input_boolean.alert_flash_active
        state: 'on'
      sequence:
      - action: light.turn_on
        data:
          entity_id: light.living_room_light
          rgb_color:
          - 255
          - 0
          - 0
          brightness_pct: 100
      - delay:
          milliseconds: 400
      - action: light.turn_on
        data:
          entity_id: light.living_room_light
          rgb_color:
          - 80
          - 0
          - 0
          brightness_pct: 30
      - delay:
          milliseconds: 400
  mode: restart
