- id: comfort_mode_light_scene
  alias: "\U0001F4A1 Comfort Mode → Light Auto Color"
  description: เปลี่ยน comfort_mode → ไฟห้องนั่งเล่นเปลี่ยนสีตามอารมณ์ทันที
  triggers:
  - platform: state
    entity_id: input_select.comfort_mode
  conditions:
  - condition: template
    value_template: '{{ trigger.from_state.state != trigger.to_state.state }}'
  - condition: not
    conditions:
    - condition: state
      entity_id: input_select.house_mode
      state: Away
    - condition: state
      entity_id: input_select.house_mode
      state: Security
  - condition: state
    entity_id: input_boolean.alert_flash_active
    state: 'off'
  - condition: state
    entity_id: input_boolean.party_loop_active
    state: 'off'
  actions:
  - action: input_boolean.turn_off
    data:
      entity_id: input_boolean.party_loop_active
  - action: input_boolean.turn_off
    data:
      entity_id: input_boolean.alert_flash_active
  - delay:
      milliseconds: 200
  - choose:
    - conditions:
      - condition: state
        entity_id: input_select.comfort_mode
        state: Normal
      sequence:
      - action: light.turn_on
        data:
          entity_id: light.living_room_light
          color_temp_kelvin: 4000
          brightness_pct: 80
          transition: 2
    - conditions:
      - condition: state
        entity_id: input_select.comfort_mode
        state: Relax
      sequence:
      - action: light.turn_on
        data:
          entity_id: light.living_room_light
          rgb_color:
          - 255
          - 160
          - 80
          brightness_pct: 50
          transition: 2
    - conditions:
      - condition: state
        entity_id: input_select.comfort_mode
        state: Warm
      sequence:
      - action: light.turn_on
        data:
          entity_id: light.living_room_light
          color_temp_kelvin: 2700
          brightness_pct: 75
          transition: 2
    - conditions:
      - condition: state
        entity_id: input_select.comfort_mode
        state: Sleep
      sequence:
      - action: light.turn_on
        data:
          entity_id: light.living_room_light
          rgb_color:
          - 255
          - 100
          - 80
          brightness_pct: 15
          transition: 3
      - delay:
          seconds: 5
      - action: light.turn_off
        data:
          entity_id: light.living_room_light
          transition: 3
  mode: restart
- id: light_mode_scene_smart
  alias: "\U0001F3A8 Living Room Light - Mode Scene"
  description: Home=Default Warm 3000K@80% | Warm=ส้มอ่อน | Sleep=ม่วง | Relax=ฟ้า
    | Away=off | Security=red
  triggers:
  - platform: state
    entity_id: input_select.comfort_mode
  - platform: state
    entity_id: input_select.house_mode
  actions:
  - action: input_boolean.turn_off
    data:
      entity_id: input_boolean.party_loop_active
  - action: input_boolean.turn_off
    data:
      entity_id: input_boolean.alert_flash_active
  - delay:
      milliseconds: 300
  - choose:
    - conditions:
      - condition: state
        entity_id: input_select.house_mode
        state: Away
      sequence:
      - action: light.turn_off
        data:
          entity_id: light.living_room_light
          transition: 1
    - conditions:
