        entity_id: input_select.house_mode
        state: Security
      sequence:
      - action: light.turn_on
        data:
          entity_id: light.living_room_light
          rgb_color:
          - 220
          - 40
          - 40
          brightness_pct: 70
          transition: 1
    - conditions:
      - condition: state
        entity_id: input_select.house_mode
        state: Home
      - condition: state
        entity_id: input_select.comfort_mode
        state: Sleep
      sequence:
      - action: light.turn_on
        data:
          entity_id: light.living_room_light
          rgb_color:
          - 148
          - 0
          - 211
          brightness_pct: 25
          transition: 2
    - conditions:
      - condition: state
        entity_id: input_select.house_mode
        state: Home
      - condition: state
        entity_id: input_select.comfort_mode
        state: Warm
      sequence:
      - action: light.turn_on
        data:
          entity_id: light.living_room_light
          rgb_color:
          - 255
          - 180
          - 120
          brightness_pct: 85
          transition: 2
    - conditions:
      - condition: state
        entity_id: input_select.house_mode
        state: Home
      - condition: state
        entity_id: input_select.comfort_mode
        state: Relax
      sequence:
      - action: light.turn_on
        data:
          entity_id: light.living_room_light
          rgb_color:
          - 119
          - 198
          - 255
          brightness_pct: 75
          transition: 2
    - conditions:
      - condition: state
        entity_id: input_select.house_mode
        state: Home
      - condition: state
        entity_id: input_select.comfort_mode
        state: Normal
      sequence:
      - action: light.turn_on
        data:
          entity_id: light.living_room_light
          color_temp_kelvin: 3000
          brightness_pct: 80
          transition: 2
    default: []
  mode: restart
- id: chavee_line_bypass
  alias: "\U0001F4AC ChAvee Bypass - LINE Webhook Handler"
  description: LINE webhook -> chat history -> Anthropic -> execute multi-action + reply
  triggers:
  - platform: webhook
    webhook_id: chavee_line_v6
    local_only: false
    allowed_methods:
    - POST
  actions:
  - variables:
      msg_text: '{{ (trigger.json.events[0].message.text) if (trigger.json.events and trigger.json.events|length > 0 and trigger.json.events[0].message is defined) else '''' }}'
      reply_token: '{{ (trigger.json.events[0].replyToken) if (trigger.json.events and trigger.json.events|length > 0) else '''' }}'
      user_id: '{{ (trigger.json.events[0].source.userId) if (trigger.json.events and trigger.json.events|length > 0 and trigger.json.events[0].source is defined and trigger.json.events[0].source.userId is defined) else ''line_user'' }}'
  - condition: template
    value_template: '{{ msg_text != '''' and reply_token != '''' }}'
  - action: rest_command.get_chat_history
    continue_on_error: true
    data:
      uid: '{{ user_id }}'
    response_variable: hist
  - variables:
      history: >-
        {% set rows = (hist.content if (hist is defined and hist.content is defined) else []) %}{% if rows %}[Previous conversation oldest-to-newest: {% for r in rows | reverse %}(user: {{ r.message }} / chavee: {{ r.reply }}) {% endfor %}] {% endif %}
  - action: rest_command.ask_anthropic
    data:
      user_msg: '{{ (((history | trim) ~ '' ## NEW MESSAGE: '' ~ msg_text) if (history | trim) else msg_text) | replace(''"'',''\\"'') | replace(''\n'', '' '') }}'
    response_variable: ai_response
  - variables:
      raw_text: '{{ (ai_response.content.content[0].text | replace(''```json'','''') | replace(''```'','''') | trim) if (ai_response.content is defined and ai_response.content.content is defined) else ''{}'' }}'
      parsed: '{{ raw_text if raw_text is mapping else (raw_text | from_json) }}'
  - action: rest_command.chavee_line_reply
    data:
      reply_token: '{{ reply_token }}'
      text: '{{ (parsed.reply_th if parsed.reply_th is defined else ''รับทราบครับ'') | replace(''"'',''\\"'') | replace(''\n'','' '') }}'
  - action: rest_command.log_chat_supabase
    continue_on_error: true
    data:
      user_id: '{{ user_id }}'
      msg: '{{ msg_text | replace(''"'','''') | replace(''\n'','' '') }}'
      reply: '{{ (parsed.reply_th | default(''-'')) | replace(''"'','''') | replace(''\n'','' '') }}'
      intent: '{{ parsed.intent | default(''chat'') }}'
  - repeat:
      for_each: '{{ parsed.haActions | default([]) }}'
      sequence:
      - continue_on_error: true
        action: '{{ repeat.item.service | replace(''/'',''.'') }}'
        data: '{{ repeat.item.body | default({}) }}'
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ (parsed.haActions | default([]) | length == 0) and parsed.haService is defined and parsed.haService and parsed.haService != ''null'' }}'
      sequence:
      - continue_on_error: true
        action: '{{ parsed.haService | replace(''/'',''.'') }}'
        data: '{{ parsed.haBody | default({}) }}'
  mode: parallel
  max: 10
- id: party_loop_safety_off
  alias: "🛑 Party Loop - Safety Auto-Off (30 min)"
  description: Prevent runaway party loop hitting 10000-iteration cap — force off after 30 min continuous
  triggers:
  - platform: state
    entity_id: input_boolean.party_loop_active
    to: "on"
    for:
      minutes: 30
  actions:
  - action: input_boolean.turn_off
    target:
      entity_id: input_boolean.party_loop_active
  mode: single
- id: fix_away_close_garage_and_lock
  alias: "\U0001F512 [Fix] Away - close garage + lock front door"
  description: "Away mode -> close garage door + auto-lock front door (bug #6/#7)"
  trigger:
  - platform: state
    entity_id: input_select.house_mode
    to: Away
  action:
  - service: cover.close_cover
    target:
      entity_id: cover.garage_door
  - service: lock.lock
    target:
      entity_id: lock.front_door_lock
  mode: single
- id: fix_security_lock
  alias: "\U0001F512 [Fix] Security - lock front door"
  description: "Security mode -> auto-lock front door (bug #7)"
  trigger:
  - platform: state
    entity_id: input_select.house_mode
    to: Security
  action:
  - service: lock.lock
    target:
      entity_id: lock.front_door_lock
  mode: single
- id: fix_garden_lights_off
  alias: "\U0001F333 [Fix] garden_lights off on Away/Security/Sleep/23:00"
  description: "Turn off forgotten switch.garden_lights in away/security/sleep/night (bug #4/#9)"
  trigger:
  - platform: state
    entity_id: input_select.house_mode
    to: Away
  - platform: state
    entity_id: input_select.house_mode
    to: Security
  - platform: state
    entity_id: input_select.comfort_mode
    to: Sleep
  - platform: time
    at: "23:00:00"
  action:
  - service: switch.turn_off
    target:
      entity_id: switch.garden_lights
  mode: single
- id: fix_garage_autoclose
  alias: "\U0001F697 [Fix] garage auto-close 5 min after opening"
  description: "If garage door stays open 5 min -> auto close (bug #6 safety)"
  trigger:
  - platform: state
    entity_id: cover.garage_door
    to: open
    for: "00:05:00"
  condition:
  - condition: state
    entity_id: input_select.house_mode
    state: Home
  action:
  - service: cover.close_cover
    target:
      entity_id: cover.garage_door
  mode: single
- id: air_purifier_auto_aqi
  alias: "\U0001F4A8 [Fix] air purifier auto by AQI (air_alert)"
  description: "air_alert on -> purifier on, off -> purifier off (bug #5)"
  trigger:
  - platform: state
    entity_id: binary_sensor.living_room_air_alert
    to: "on"
    id: bad
  - platform: state
    entity_id: binary_sensor.living_room_air_alert
    to: "off"
    id: good
  condition:
  - condition: state
    entity_id: input_select.house_mode
    state: Home
  action:
  - choose:
    - conditions:
      - condition: trigger
        id: bad
      sequence:
      - service: switch.turn_on
        target:
          entity_id: switch.living_room_air_purifier
    - conditions:
      - condition: trigger
        id: good
      sequence:
      - service: switch.turn_off
        target:
          entity_id: switch.living_room_air_purifier
  mode: single
- id: fix_alert_flash_safety_autoclear
  alias: "\U0001F6A8 [Fix] sustained alert flash > 10 min -> auto clear"
  description: "Safety net: if alert_flash_active stuck on 10 min -> clear (bug #15)"
  trigger:
  - platform: state
    entity_id: input_boolean.alert_flash_active
    to: "on"
    for: "00:10:00"
  action:
  - service: input_boolean.turn_off
    target:
      entity_id: input_boolean.alert_flash_active
  mode: single
