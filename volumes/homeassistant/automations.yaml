- id: auto_fan_temperature
  alias: Auto Fan — Temperature > 30°C
  description: เปิดพัดลมอัตโนมัติเมื่ออุณหภูมิสูงเกิน 30°C
  trigger:
  - platform: numeric_state
    entity_id: sensor.living_room_temperature
    above: 30
  condition:
  - condition: state
    entity_id: input_select.house_mode
    state: Home
  action:
  - service: switch.turn_on
    target:
      entity_id:
      - switch.living_room_fan
  - service: rest_command.send_alert
    data:
      alert_type: temp_high
      value: '{{ states(''sensor.living_room_temperature'') }}'
      room: living_room
- id: auto_fan_off_cool
  alias: "\U0001F4A8 Auto Fan OFF — Living Room < 28\xB0C (hysteresis)"
  description: "\u0E2D\u0E38\u0E13\u0E2B\u0E20\u0E39\u0E21\u0E34 < 28\xB0C \u2192 \u0E1B\u0E34\u0E14\u0E1E\u0E31\u0E14\u0E25\u0E21 (\u0E04\u0E39\u0E48 on>30)"
  trigger:
  - platform: numeric_state
    entity_id: sensor.living_room_temperature
    below: 28
  condition:
  - condition: state
    entity_id: switch.living_room_fan
    state: 'on'
  action:
  - service: switch.turn_off
    target:
      entity_id: switch.living_room_fan
  mode: single
- id: auto_garden_light_on
  alias: Garden Light ON — 18:00
  trigger:
  - platform: time
    at: '18:00:00'
  action:
  - service: switch.turn_on
    target:
      entity_id: switch.garden_lights
  - service: rest_command.send_alert
    data:
      alert_type: garden_light_on
      value: '18:00'
      room: garden
- id: auto_garden_light_off
  alias: Garden Light OFF — 23:00
  trigger:
  - platform: time
    at: '23:00:00'
  action:
  - service: switch.turn_off
    target:
      entity_id: switch.garden_lights
- id: alert_door_unlocked_too_long
  alias: "\U0001F6AA แจ้งเตือนประตูไม่ล็อกนานเกิน 10 นาที"
  description: ถ้าประตูหน้าบ้านไม่ได้ล็อกนานเกิน 10 นาที ให้แจ้ง LINE
  trigger:
  - platform: state
    entity_id: lock.front_door_lock
    to: 'unlocked'
    for:
      minutes: 10
  condition:
  - condition: state
    entity_id: input_select.house_mode
    state: Home
  action:
  - service: rest_command.send_alert
    data:
      alert_type: door_open
      value: '10'
      room: frontdoor
- id: v2_adaptive_bedroom_light
  alias: "\U0001F4A1 Bedroom Adaptive Light - Motion + LDR"
  description: เปิดไฟห้องนอนเมื่อมีคน + มืดพอ
  triggers:
  - platform: state
    entity_id: binary_sensor.bedroom_presence
    to: 'on'
  conditions:
  - condition: numeric_state
    entity_id: sensor.bedroom_ldr
    above: 2200
  - condition: state
    entity_id: switch.bedroom_light
    state: 'off'
  - condition: not
    conditions:
    - condition: state
      entity_id: input_select.house_mode
      state: Away
    - condition: state
      entity_id: input_select.comfort_mode
      state: Sleep
  actions:
  - target:
      entity_id: switch.bedroom_light
    action: switch.turn_on
- id: v2_adaptive_livingroom_light
  alias: "\U0001F4A1 Living Room Adaptive Light - Motion + LDR"
  description: เปิด Tuya bulb เมื่อมีคน + brightness ตาม LDR
  triggers:
  - platform: state
    entity_id: binary_sensor.living_room_motion
    to: 'on'
  conditions:
  - condition: numeric_state
    entity_id: sensor.living_room_ldr
    above: 2200
  - condition: state
    entity_id: light.living_room_light
    state: 'off'
  - condition: not
    conditions:
    - condition: state
      entity_id: input_select.house_mode
      state: Away
    - condition: state
      entity_id: input_select.comfort_mode
      state: Sleep
  actions:
  - target:
      entity_id: light.living_room_light
    data:
      brightness: '{% set ldr = states(''sensor.living_room_ldr'') | float(2200) %}{{
        ((ldr - 2200) / 1300 * 200 + 55) | int | min(255) | max(80) }}'
      color_temp_kelvin: 3500
    action: light.turn_on
- id: v2_adaptive_bathroom_light
  alias: "\U0001F4A1 Bathroom Adaptive Light - Presence + LDR"
  description: เปิดไฟห้องน้ำเมื่อมีคน + มืด
  triggers:
  - platform: state
    entity_id: binary_sensor.bathroom_presence
    to: 'on'
  conditions:
  - condition: numeric_state
    entity_id: sensor.bathroom_ldr
    above: 2000
  - condition: state
    entity_id: switch.bathroom_light
    state: 'off'
  - condition: not
    conditions:
    - condition: state
      entity_id: input_select.house_mode
      state: Away
  actions:
  - target:
      entity_id: switch.bathroom_light
    action: switch.turn_on
- id: v2_adaptive_garage_light
  alias: "\U0001F4A1 Garage Adaptive Light - Motion + LDR"
  description: เปิดไฟโรงรถ + ทางเดิน เมื่อมีคน + มืด
  triggers:
  - platform: state
    entity_id: binary_sensor.garage_motion
    to: 'on'
  conditions:
  - condition: numeric_state
    entity_id: sensor.garage_ldr
    above: 2400
  actions:
  - target:
      entity_id:
      - switch.garage_light
      - switch.garage_pathway_light
    action: switch.turn_on
- id: v2_autooff_garage
  alias: "\U0001F305 Auto-Off Garage Lights (no motion 5min)"
  triggers:
  - platform: state
    entity_id: binary_sensor.garage_motion
    to: 'off'
    for: 00:05:00
  actions:
  - target:
      entity_id:
      - switch.garage_light
      - switch.garage_pathway_light
    action: switch.turn_off
- id: v2_autooff_bathroom
  alias: "\U0001F305 Auto-Off Bathroom Light (no presence 5min)"
  triggers:
  - platform: state
    entity_id: binary_sensor.bathroom_presence
    to: 'off'
    for: 00:05:00
  conditions:
  - condition: state
    entity_id: switch.bathroom_light
    state: 'on'
  actions:
  - target:
      entity_id: switch.bathroom_light
    action: switch.turn_off
- id: v2_sleep_path_light
  alias: "\U0001F319 Sleep Path Light - Bedroom Motion → Living Dim"
  description: 'Sleep mode: PIR ห้องนอน → Tuya bulb dim warm 10% 2 นาที'
  triggers:
  - platform: state
    entity_id: binary_sensor.bedroom_presence
    to: 'on'
  conditions:
  - condition: state
    entity_id: input_select.comfort_mode
    state: Sleep
  - condition: state
    entity_id: input_select.house_mode
    state: Home
  actions:
  - target:
      entity_id: light.living_room_light
    data:
      brightness: 25
      color_temp_kelvin: 2200
    action: light.turn_on
  - delay: 00:02:00
  - target:
      entity_id: light.living_room_light
    action: light.turn_off
- id: v2_gps_welcome_adaptive
  alias: "\U0001F3E0 GPS Welcome Home - Adaptive Outdoor Lights + Garage"
  description: GPS ตรวจจับถึงบ้าน → garage + ไฟภายนอกตาม LDR
  triggers:
  - platform: state
    entity_id: person.athit_boonpinit
    from: not_home
    to: home
    for: "00:00:30"
  conditions:
  - condition: state
    entity_id: input_select.house_mode
    state: Away
  actions:
  - target:
      entity_id: cover.garage_door
    action: cover.open_cover
  - choose:
    - conditions:
      - condition: numeric_state
        entity_id: sensor.garage_ldr
        above: 2400
      sequence:
      - target:
          entity_id:
          - switch.garage_light
          - switch.garage_pathway_light
        action: switch.turn_on
  - choose:
    - conditions:
      - condition: numeric_state
        entity_id: sensor.garden_ldr
        above: 2200
      sequence:
      - target:
          entity_id:
          - switch.garden_lights
        action: switch.turn_on
  - target:
      entity_id: input_select.house_mode
    data:
      option: Home
    action: input_select.select_option
  - data:
      alert_type: welcome_home
      value: ยินดีต้อนรับกลับบ้าน — เปิดโรงรถและไฟภายนอกตามแสงให้แล้ว
      room: home
    action: rest_command.send_alert
- id: v2_relax_auto_fan
  alias: "\U0001F6CB Relax Mode - Auto Fan if Hot"
  description: Relax mode + ห้องร้อน → เปิดพัดลม + Tuya warm
  triggers:
  - platform: numeric_state
    entity_id: sensor.living_room_temperature
    above: 28
  conditions:
  - condition: state
    entity_id: input_select.comfort_mode
    state: Relax
  - condition: state
    entity_id: input_select.house_mode
    state: Home
  - condition: state
    entity_id: switch.living_room_fan
    state: 'off'
  actions:
  - target:
      entity_id: switch.living_room_fan
    action: switch.turn_on
  - target:
      entity_id: light.living_room_light
    data:
      brightness: 153
      color_temp_kelvin: 2700
    action: light.turn_on
- id: v2_gps_goodbye
  alias: "\U0001F6AA GPS Goodbye - Auto Away after 2min grace"
  description: ออกจากบ้าน 2 นาที → set Away mode
  triggers:
  - platform: state
    entity_id: person.athit_boonpinit
    from: home
    to: not_home
    for: 00:02:00
  conditions:
  - condition: not
    conditions:
    - condition: state
      entity_id: input_select.house_mode
      state: Away
  actions:
  - target:
      entity_id: input_select.house_mode
    data:
      option: Away
    action: input_select.select_option
  - data:
      alert_type: goodbye
      value: ออกจากบ้านเกิน 2 นาที — ตั้ง Away mode ให้อัตโนมัติ
      room: home
    action: rest_command.send_alert
- id: v2_stove_warning
  alias: "\U0001F525 Stove Safety - Warning if abandoned 10min"
  description: เตาเปิด 10 นาที + คนอยู่ห้องอื่น → LINE warning
  triggers:
  - platform: state
    entity_id: switch.kitchen_stove
    to: 'on'
    for: 00:10:00
  conditions:
  - condition: state
    entity_id: binary_sensor.bedroom_presence
    state: 'on'
  actions:
  - data:
      alert_type: stove_abandoned
      value: ⚠️ เตาเปิดทิ้งไว้ 10 นาทีแล้ว!
      room: kitchen
    action: rest_command.send_alert
- id: v2_stove_autooff
  alias: "\U0001F525 Stove Safety - Auto-OFF if abandoned 15min"
  description: เตาเปิด 15 นาที + Away mode → auto-off
  triggers:
  - platform: state
    entity_id: switch.kitchen_stove
    to: 'on'
    for: 00:15:00
  conditions:
  - condition: state
    entity_id: input_select.house_mode
    state: Away
  actions:
  - target:
      entity_id: switch.kitchen_stove
    action: switch.turn_off
  - data:
      alert_type: stove_auto_off
      value: "\U0001F6D1 เตาเปิดทิ้งไว้ตอนไม่อยู่บ้าน — ปิดให้แล้ว"
      room: kitchen
    action: rest_command.send_alert
- id: v2_curtain_sunset_close
  alias: "\U0001F305 Bedroom Curtain - Auto Close at Sunset"
  description: พระอาทิตย์ตก + Home → ปิดม่านห้องนอน
  triggers:
  - platform: state
    entity_id: sun.sun
    to: below_horizon
  conditions:
  - condition: state
    entity_id: input_select.house_mode
    state: Home
  - condition: state
    entity_id: cover.bedroom_curtain
    state: open
  actions:
  - target:
      entity_id: cover.bedroom_curtain
    action: cover.close_cover
  - data:
      alert_type: curtain_sunset
      value: "\U0001F305 พระอาทิตย์ตก — ปิดม่านห้องนอนให้"
      room: bedroom
    action: rest_command.send_alert
- id: v2_curtain_sunrise_open
  alias: "\U0001F31E Bedroom Curtain - Auto Open after Sunrise +30min"
  description: หลังพระอาทิตย์ขึ้น 30 นาที → เปิดม่าน (ถ้าไม่ใช่ Sleep)
  triggers:
  - platform: sun
    event: sunrise
    offset: +00:30:00
  conditions:
  - condition: state
    entity_id: input_select.house_mode
    state: Home
  - condition: not
    conditions:
    - condition: state
      entity_id: input_select.comfort_mode
      state: Sleep
  - condition: state
    entity_id: cover.bedroom_curtain
    state: closed
  actions:
  - target:
      entity_id: cover.bedroom_curtain
    action: cover.open_cover
- id: v2_sleep_fan_on
  alias: "\U0001F4A8 Sleep Mode - Bedroom Auto-Fan if Hot"
  description: Sleep + ห้องนอน >27°C → เปิดพัดลม
  triggers:
  - platform: numeric_state
    entity_id: sensor.bedroom_temperature
    above: 27
  conditions:
  - condition: state
    entity_id: input_select.comfort_mode
    state: Sleep
  - condition: state
    entity_id: input_select.house_mode
    state: Home
  - condition: state
    entity_id: switch.bedroom_fan
    state: 'off'
  actions:
  - target:
      entity_id: switch.bedroom_fan
    action: switch.turn_on
- id: v2_sleep_fan_off
  alias: "\U0001F4A8 Sleep Mode - Bedroom Auto-Fan OFF when cool"
  description: Sleep + ห้องนอน <25°C → ปิดพัดลม
  triggers:
  - platform: numeric_state
    entity_id: sensor.bedroom_temperature
    below: 25
  conditions:
  - condition: state
    entity_id: input_select.comfort_mode
    state: Sleep
  - condition: state
    entity_id: switch.bedroom_fan
    state: 'on'
  actions:
  - target:
      entity_id: switch.bedroom_fan
    action: switch.turn_off
- id: mobile_house_mode_change
  alias: "\U0001F4F1 [Mobile+LINE] House Mode Change"
  triggers:
  - platform: state
    entity_id: input_select.house_mode
  conditions:
  - condition: template
    value_template: '{{ trigger.from_state.state != trigger.to_state.state }}'
  actions:
  - data:
      title: "\U0001F3E0 โหมดบ้านเปลี่ยน"
      message: "{{ trigger.from_state.state }} → {{ trigger.to_state.state }}\n{%
        if trigger.to_state.state == 'Away' %}\U0001F512 ปิดอุปกรณ์ + ล็อคประตู{%
        elif trigger.to_state.state == 'Security' %}\U0001F6E1️ ระบบความปลอดภัยเปิด{%
        elif trigger.to_state.state == 'Home' %}✅ พร้อมใช้งาน{% endif %}"
      data:
        push:
          sound: default
    action: notify.mobile_app_maradosx
  - data:
      title: "\U0001F3E0 House Mode"
      message: '{{ trigger.from_state.state }} → {{ trigger.to_state.state }}'
    action: persistent_notification.create
  - data:
      alert_type: '{{ ''gps_away'' if trigger.to_state.state == ''Away'' else (''gps_home''
        if trigger.to_state.state == ''Home'' else ''away_on'') }}'
      value: '{{ trigger.from_state.state }} -> {{ trigger.to_state.state }}'
      room: all
    action: rest_command.send_alert
  mode: single
- id: mobile_comfort_mode_change
  alias: "\U0001F4F1 [Mobile+LINE] Comfort Mode Change"
  triggers:
  - platform: state
    entity_id: input_select.comfort_mode
  conditions:
  - condition: template
    value_template: '{{ trigger.from_state.state != trigger.to_state.state }}'
  actions:
  - data:
      title: "\U0001F321️ Comfort Mode"
      message: '{{ trigger.from_state.state }} → {{ trigger.to_state.state }}'
      data:
        push:
          sound: default
    action: notify.mobile_app_maradosx
  - data:
      title: "\U0001F321️ Comfort Mode"
      message: '{{ trigger.from_state.state }} → {{ trigger.to_state.state }}'
    action: persistent_notification.create
  - data:
      alert_type: away_on
      value: '{{ trigger.to_state.state }} mode'
      room: all
    action: rest_command.send_alert
  mode: single
- id: mobile_gas_alert
  alias: "\U0001F4F1 [Mobile+LINE] Gas Alert - ALL CHANNELS"
  triggers:
  - platform: state
    entity_id: binary_sensor.kitchen_gas_alert
    to: 'on'
  actions:
  - data:
      title: "\U0001F6A8 GAS LEAK ALERT!"
      message: '⚠️ แก๊สรั่วในครัว! ค่า: {{ states(''sensor.kitchen_gas_lpg'') }} ADC'
      data:
        push:
          sound: alarm.caf
          badge: 1
          interruption-level: critical
    action: notify.mobile_app_maradosx
  - data:
      title: "\U0001F6A8 GAS LEAK"
      message: 'ค่า: {{ states(''sensor.kitchen_gas_lpg'') }} ADC'
      notification_id: gas_alert_critical
    action: persistent_notification.create
  - target:
      entity_id: light.living_room_light
    data:
      color_name: red
      brightness: 255
    action: light.turn_on
  - data:
      alert_type: gas_alert
      value: '{{ states(''sensor.kitchen_gas_lpg'') }}'
      room: kitchen
    action: rest_command.send_alert
  mode: single
- id: mobile_water_leak
  alias: "\U0001F4F1 [Mobile+LINE] Water Leak - ALL CHANNELS"
  triggers:
  - platform: state
    entity_id: binary_sensor.bathroom_water_leak
    to: 'on'
  actions:
  - data:
      title: "\U0001F4A7 WATER LEAK!"
      message: ⚠️ น้ำรั่วในห้องน้ำ! รีบเช็คด่วน
      data:
        push:
          sound: alarm.caf
          badge: 1
          interruption-level: critical
    action: notify.mobile_app_maradosx
  - data:
      title: "\U0001F4A7 WATER LEAK"
      message: น้ำรั่ว!
      notification_id: water_leak_critical
    action: persistent_notification.create
  - target:
      entity_id: light.living_room_light
    data:
      color_name: red
      brightness: 255
    action: light.turn_on
  - data:
      alert_type: water_leak
      value: detected
      room: bathroom
    action: rest_command.send_alert
  mode: single
- id: mobile_bathroom_fall
  alias: "\U0001F4F1 [Mobile+LINE] Bathroom Fall - ALL CHANNELS"
  triggers:
  - platform: state
    entity_id: binary_sensor.bathroom_fall_alert
    to: 'on'
  actions:
  - data:
      title: "\U0001F198 FALL DETECTED!"
      message: ⚠️ การล้มในห้องน้ำ!
      data:
        push:
          sound: alarm.caf
          interruption-level: critical
    action: notify.mobile_app_maradosx
  - data:
      title: "\U0001F198 FALL"
      message: การล้มในห้องน้ำ!
      notification_id: bathroom_fall_critical
    action: persistent_notification.create
  - data:
      alert_type: fall_alert
      value: detected
      room: bathroom
    action: rest_command.send_alert
  mode: single
- id: mobile_door_intrusion
  alias: "\U0001F4F1 [Mobile+LINE] Door Intrusion (Away/Security)"
  triggers:
  - platform: state
    entity_id: binary_sensor.front_door
    to: 'on'
  conditions:
  - condition: template
    value_template: '{{ states(''input_select.house_mode'') in [''Away'',''Security'']
      }}'
  actions:
  - data:
      title: "\U0001F6A8 INTRUSION ALERT"
      message: ประตูหน้าเปิดช่วง {{ states('input_select.house_mode') }} mode!
      data:
        push:
          sound: alarm.caf
          interruption-level: critical
    action: notify.mobile_app_maradosx
  - data:
      title: "\U0001F6A8 INTRUSION"
      message: Door opened during {{ states('input_select.house_mode') }}
      notification_id: door_intrusion
    action: persistent_notification.create
  - data:
      alert_type: security_door
      value: '{{ now().strftime(''%H:%M:%S'') }}'
      room: frontdoor
    action: rest_command.send_alert
  mode: single
- id: mobile_pump_state
  alias: "\U0001F4F1 [Mobile+LINE] Garden Pump State Change"
  triggers:
  - platform: state
    entity_id: switch.garden_water_pump
  conditions:
  - condition: template
    value_template: '{{ trigger.from_state.state != trigger.to_state.state and trigger.from_state.state
      not in [''unknown'',''unavailable''] }}'
  actions:
  - data:
      title: "\U0001F331 ปั๊มน้ำสวน"
      message: "{% if trigger.to_state.state == 'on' %}\U0001F4A7 เริ่มรดน้ำ (ดิน
        {{ states('sensor.garden_soil_moisture') }}%){% else %}✅ หยุดรดน้ำ (ดิน {{
        states('sensor.garden_soil_moisture') }}%){% endif %}"
      data:
        push:
          sound: default
    action: notify.mobile_app_maradosx
  - data:
      title: "\U0001F331 Pump"
      message: '{{ trigger.to_state.state }} (soil: {{ states(''sensor.garden_soil_moisture'')
        }}%)'
    action: persistent_notification.create
  - data:
      alert_type: '{{ ''soil_dry'' if trigger.to_state.state == ''on'' else ''pump_done''
        }}'
      value: '{{ states(''sensor.garden_soil_moisture'') }}'
      room: garden
    action: rest_command.send_alert
  mode: single
- id: mobile_garage_door
  alias: "\U0001F4F1 [Mobile+LINE] Garage Door State"
  triggers:
  - platform: state
    entity_id: cover.garage_door
  conditions:
  - condition: template
    value_template: '{{ trigger.to_state.state in [''open'',''opening''] }}'
  actions:
  - data:
      title: "\U0001F697 ประตูโรงรถ"
      message: '{{ trigger.to_state.state }} ที่ {{ now().strftime(''%H:%M:%S'') }}'
      data:
        push:
          sound: default
    action: notify.mobile_app_maradosx
  - data:
      title: "\U0001F697 Garage Door"
      message: '{{ trigger.to_state.state }}'
    action: persistent_notification.create
  - data:
      alert_type: garage_door
      value: '{{ trigger.to_state.state }}'
      room: garage
    action: rest_command.send_alert
  mode: single
- id: smart_bedroom_light_on
  alias: "\U0001F4A1 [Bedroom] Smart Light - Auto ON"
  description: Motion+dark trigger. Blocked when alert/party scene active.
  triggers:
