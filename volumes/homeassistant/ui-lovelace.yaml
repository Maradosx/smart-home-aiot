      - type: markdown
        content: >
          ### 🤖 AI Assistant: ชาวี (LINE Bot · Groq LLaMA 3 70B)

          | ความสามารถ | รายละเอียด |
          |---|---|
          | 💡 ควบคุมไฟ | เปิด/ปิด LED ทุกห้อง (direct GPIO) + IKEA RGBW (ห้องนั่งเล่น) |
          | 🌀 ควบคุมพัดลม | Relay (ห้องนอน · ครัว) + Zigbee Plug S26R2ZB (ห้องนั่งเล่น) |
          | 🪟 ควบคุมม่าน | เปิด/ปิดม่านห้องนอน (Servo SG90 · GPIO25) |
          | 🚗 ประตูโรงรถ | OPEN / CLOSE / STOP (Servo SG90 360° + Time-based) |
          | 💧 ควบคุมปั๊มน้ำ | เปิด/ปิดปั๊มสวน (Auto soil moisture < 30%) |
          | 🔥 เตาครัว Sim | สั่งเปิด/ปิด Relay เตา (simulator demo) |
          | 😌 Comfort Mode | Relax / Warm / Sleep (ปรับไฟ+พัดลม+ม่านอัตโนมัติ) |
          | 🏠 ตั้งโหมดบ้าน | Home / Away (GPS auto) / Security (manual) |
          | 📊 อ่านค่า Sensor | อุณหภูมิ · ความชื้น · แก๊ส · ความชื้นดิน · ประตู · LDR |
          | 🚨 แจ้งเตือนอัตโนมัติ | Gas · Smoke · Water Leak · Soil Dry · Fall Detection |
          | 🗣️ Alexa Voice | สั่งงานด้วยเสียง (Amazon Echo · Custom Skill + Emulated Hue) |
          | 🧠 AI Intent | Groq LLaMA 3 70B (llama3-70b-8192) · JSON response · ภาษาไทย + อังกฤษ |
          | ⚡ n8n Workflow | LINE Webhook → Groq LLaMA API → HA REST → LINE Reply |

