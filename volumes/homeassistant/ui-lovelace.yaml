      - type: markdown
        content: >
          ### 🏗️ System Architecture

          | Layer | Technology | Detail |
          |---|---|---|
          | 🔧 Hardware | ESP32 DevKit V1 × 5 | ESP32-WROOM-32 · WiFi 2.4GHz · MQTT Client |
          | 🌡️ Sensor | DHT22 × 3 | อุณหภูมิ+ความชื้น (ห้องนอน · ห้องนั่งเล่น · ครัว) |
          | 👁️ Sensor | HLK-LD2410C × 2 | mmWave Presence + Fall Detection (ห้องนอน · ห้องน้ำ) |
          | 🌬️ Sensor | MQ-2 × 2 · MQ-135 × 1 | แก๊ส LPG (ครัว · โรงรถ) · คุณภาพอากาศ (ห้องนั่งเล่น) |
          | 🌱 Sensor | Soil Moisture v1.2 · LDR × 5 | ความชื้นดินสวน · แสงสว่าง (ทุก ESP32) |
          | 💡 Actuator | LED 5mm × 7 (direct GPIO) | ห้องนอน · ครัว · ห้องน้ำ · สวน · ทางเดินสวน · โรงรถ · ทางเดินรถ |
          | 🔁 Actuator | Relay 1CH × 4 (Active LOW) | พัดลมห้องนอน · พัดลมครัว · ปั๊มน้ำ · เตาครัว (Simulator) |
          | 🔄 Actuator | Servo SG90 (PWM 50Hz) × 2 | ม่านห้องนอน (GPIO25) · ประตูโรงรถ 360° (GPIO26) |
          | 💡 Zigbee | IKEA TRÅDFRI RGBW E27 × 1 | หลอดไฟ RGB ห้องนั่งเล่น (เท่านั้น) |
          | 🔌 Zigbee | Sonoff S26R2ZB × 2 | Smart Plug: พัดลม LR · เครื่องฟอกอากาศ LR |
          | 📡 Zigbee | SNZB-03P · SNZB-04 · SNZB-05 | PIR Motion (LR) · Door Sensor (ทางเข้า) · Water Leak (ห้องน้ำ) |
          | 🎯 Zigbee | ZBDongle-P + Pi Zero 2W | Zigbee Coordinator + Zigbee2MQTT Bridge |
          | 📮 Protocol | MQTT · Mosquitto (AWS EC2) | Broker: 54.226.244.180:1883 · Publish/Subscribe |
          | 🏠 Platform | Home Assistant 2026.3 (Docker · EC2) | Dashboard · 15 Automations · Emulated Hue |
          | ⚙️ Automation | n8n Workflow (Railway Cloud) | Webhook · LINE Reply · HA REST API · Conversation Memory |
          | 🤖 AI Engine | Groq + Meta LLaMA 3 70B (llama3-70b-8192) | NLP ภาษาไทย · JSON Intent Analysis · Context Memory |
          | 🗣️ Voice | Alexa Custom Skill + AWS Lambda | สั่งงานด้วยเสียง · Amazon Echo |
          | 💬 Interface | LINE Bot (ชาวี) + Emulated Hue | Mobile · ภาษาไทย · Alexa fallback |

