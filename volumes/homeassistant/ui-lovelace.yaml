# ============================================================
# Smart Home AIoT — Professional Dashboard
# Smart Home: Development of a Home Automation System
# SYSTEM CONTROLLED BY MOBILE AND VOICE COMMANDS
# ============================================================

title: Smart Home AIoT
views:

  # ══════════════════════════════════════════════════════════════
  # VIEW 1 — MAIN DASHBOARD
  # ══════════════════════════════════════════════════════════════
  - title: หน้าหลัก
    path: overview
    icon: mdi:home-automation
    badges: []
    cards:

      # ── PROJECT HEADER ──────────────────────────────────────────
      - type: markdown
        content: >
          <div style="text-align:center; padding:20px 12px 12px;">
            <div style="font-size:11px; font-weight:600; letter-spacing:4px; color:#7c8db5; text-transform:uppercase; margin-bottom:6px;">Senior Project · Computer Engineering</div>
            <div style="font-size:28px; font-weight:900; color:#e8eaf6; margin-bottom:6px; letter-spacing:1px;">🏠 Smart Home <span style="color:#5c6bc0;">AIoT</span></div>
            <div style="font-size:14px; font-weight:700; color:#90caf9; letter-spacing:1px; margin-bottom:4px;">Development of a Home Automation System</div>
            <div style="font-size:11px; font-weight:500; letter-spacing:3px; color:#64b5f6; text-transform:uppercase; margin-bottom:12px;">System Controlled by Mobile &amp; Voice Commands</div>
            <div style="height:2px; background:linear-gradient(to right,transparent,#5c6bc0,#7986cb,#5c6bc0,transparent); margin:8px 0 10px;"></div>
            <div style="font-size:12px; color:#9fa8da; font-style:italic; line-height:1.6;">สมาร์ทโฮม: การพัฒนาบ้านอัจฉริยะที่ควบคุมด้วยมือถือและคำสั่งเสียง</div>
            <div style="margin-top:10px; display:flex; justify-content:center; gap:8px; flex-wrap:wrap;">
              <span style="background:rgba(92,107,192,0.2); border:1px solid #5c6bc0; border-radius:20px; padding:3px 12px; font-size:10px; color:#9fa8da;">ESP32</span>
              <span style="background:rgba(92,107,192,0.2); border:1px solid #5c6bc0; border-radius:20px; padding:3px 12px; font-size:10px; color:#9fa8da;">MQTT</span>
              <span style="background:rgba(92,107,192,0.2); border:1px solid #5c6bc0; border-radius:20px; padding:3px 12px; font-size:10px; color:#9fa8da;">Home Assistant</span>
              <span style="background:rgba(92,107,192,0.2); border:1px solid #5c6bc0; border-radius:20px; padding:3px 12px; font-size:10px; color:#9fa8da;">Groq LLaMA 3 70B</span>
              <span style="background:rgba(92,107,192,0.2); border:1px solid #5c6bc0; border-radius:20px; padding:3px 12px; font-size:10px; color:#9fa8da;">LINE Bot</span>
              <span style="background:rgba(92,107,192,0.2); border:1px solid #5c6bc0; border-radius:20px; padding:3px 12px; font-size:10px; color:#9fa8da;">Alexa</span>
            </div>
          </div>

      # ── SYSTEM MODE STATUS ─────────────────────────────────────
      - type: horizontal-stack
        cards:
          - type: entity
            entity: input_select.house_mode
            name: House Mode
            icon: mdi:home-circle
          - type: entity
            entity: input_select.comfort_mode
            name: Comfort Mode
            icon: mdi:sofa-single

      # ── SENSOR OVERVIEW ────────────────────────────────────────
      - type: glance
        title: 📊 Sensor Overview
        show_name: true
        show_state: true
        columns: 4
        entities:
          - entity: sensor.living_room_temperature
            name: LivingRoom °C
            icon: mdi:thermometer
          - entity: sensor.living_room_humidity
            name: Humidity %
            icon: mdi:water-percent
          - entity: sensor.bedroom_temperature
            name: Bedroom °C
            icon: mdi:thermometer
          - entity: sensor.garden_soil_moisture
            name: Soil %
            icon: mdi:sprout

      - type: glance
        show_name: true
        show_state: true
        columns: 4
        entities:
          - entity: sensor.kitchen_gas_lpg
            name: Gas ADC
            icon: mdi:gas-cylinder
          - entity: binary_sensor.living_room_motion
            name: PIR Motion
            icon: mdi:motion-sensor
          - entity: binary_sensor.front_door
            name: ประตู
            icon: mdi:door
          - entity: binary_sensor.bathroom_water_leak
            name: Water Leak
            icon: mdi:water-alert

      # ── QUICK CONTROL ──────────────────────────────────────────
      - type: markdown
        content: "### ⚡ Quick Control"

      - type: horizontal-stack
        cards:
          - type: button
            entity: light.livingroom_rgbw
            name: 🌈 LR Light
            icon: mdi:ceiling-light
            show_state: true
            tap_action:
              action: toggle
          - type: button
            entity: switch.bedroom_light
            name: Bedroom Light
            icon: mdi:lamp
            show_state: true
            tap_action:
              action: toggle
          - type: button
            entity: switch.kitchen_light
            name: Kitchen Light
            icon: mdi:lightbulb
            show_state: true
            tap_action:
              action: toggle
          - type: button
            entity: switch.bathroom_light
            name: Bath Light
            icon: mdi:lightbulb
            show_state: true
            tap_action:
              action: toggle

      - type: horizontal-stack
        cards:
          - type: button
            entity: switch.garden_light
            name: Garden Light
            icon: mdi:outdoor-lamp
            show_state: true
            tap_action:
              action: toggle
          - type: button
            entity: switch.bedroom_fan
            name: Bedroom Fan
            icon: mdi:fan
            show_state: true
            tap_action:
              action: toggle
          - type: button
            entity: switch.kitchen_fan
            name: Kitchen Fan
            icon: mdi:fan-clock
            show_state: true
            tap_action:
              action: toggle
          - type: button
            entity: switch.garage_light
            name: Garage Light
            icon: mdi:garage
            show_state: true
            tap_action:
              action: toggle

      - type: horizontal-stack
        cards:
          - type: button
            entity: switch.garden_water_pump
            name: 💧 Water Pump
            icon: mdi:water-pump
            show_state: true
            tap_action:
              action: toggle
          - type: button
            entity: cover.bedroom_curtain
            name: 🪟 ม่าน
            icon: mdi:curtains
            show_state: true
            tap_action:
              action: toggle
          - type: button
            entity: cover.garage_door
            name: 🚗 Garage Door
            icon: mdi:garage-open
            show_state: true
            tap_action:
              action: toggle
          - type: entity
            entity: binary_sensor.front_door
            name: 🚪 ประตู
            icon: mdi:door

      - type: horizontal-stack
        cards:
          - type: entity
            entity: binary_sensor.kitchen_gas_alert
            name: ⚠️ Gas (ครัว)
            icon: mdi:gas-cylinder
          - type: entity
            entity: binary_sensor.garage_smoke_alert
            name: ⚠️ Smoke (รถ)
            icon: mdi:smoke-detector
          - type: entity
            entity: binary_sensor.bathroom_water_leak
            name: 💧 Water Leak
            icon: mdi:water-alert
          - type: entity
            entity: binary_sensor.bathroom_fall_alert
            name: 🚨 Fall
            icon: mdi:human-cane

      # ── AI ASSISTANT INFO ──────────────────────────────────────
      - type: markdown
        content: >
          <div style="padding:12px 14px;border-left:3px solid #5c6bc0;background:rgba(92,107,192,0.08);border-radius:6px;">
            <div style="font-size:13px;color:#9fa8da;font-weight:600;">🤖 AI Assistant: <strong style="color:#c5cae9;">ชาวี</strong></div>
            <div style="font-size:11px;color:#7986cb;margin-top:4px;">Groq LLaMA 3 70B (Meta) · n8n (Railway) · LINE Bot · Alexa Custom Skill</div>
            <div style="font-size:11px;color:#546e7a;margin-top:4px;">ส่งข้อความใน LINE เพื่อสั่งการ เช่น "เปิดไฟ", "ปิดพัดลม", "สรุปสถานะบ้าน" | สั่งเสียง Alexa ได้</div>
          </div>

  # ══════════════════════════════════════════════════════════════
  # VIEW 2 — ROOMS (แยกห้อง) — Floor Plan Layout
  # ══════════════════════════════════════════════════════════════
  - title: แยกห้อง
    path: rooms
    icon: mdi:floor-plan
    badges: []
    cards:

      # ── FLOOR PLAN HEADER ───────────────────────────────────────
      - type: markdown
        content: >
          <div style="text-align:center;padding:10px 8px 4px;">
            <div style="font-size:16px;font-weight:700;color:#e8eaf6;">📐 Floor Plan — แผนผังบ้าน</div>
            <div style="font-size:11px;color:#7986cb;margin-top:4px;">อุปกรณ์แยกตามห้อง · Devices by Room</div>
            <div style="height:1px;background:linear-gradient(to right,transparent,#5c6bc0,transparent);margin:8px 0 0;"></div>
          </div>

      # ── ROW 1: LIVING ROOM + BEDROOM ───────────────────────────
      - type: horizontal-stack
        cards:

          # ── LIVING ROOM ──────────────────────────────────────
          - type: vertical-stack
            cards:
              - type: markdown
                content: >
                  <div style="background:linear-gradient(135deg,#1565c0,#1976d2);padding:10px 14px;border-radius:10px 10px 0 0;margin-bottom:-2px;">
                    <div style="font-size:15px;font-weight:800;color:white;">🛋️ ห้องนั่งเล่น</div>
                    <div style="font-size:10px;color:#bbdefb;margin-top:2px;">Living Room</div>
                  </div>
              - type: glance
                show_name: true
                show_state: true
                columns: 5
                entities:
                  - entity: sensor.living_room_temperature
                    name: อุณหภูมิ
                    icon: mdi:thermometer
                  - entity: sensor.living_room_humidity
                    name: ความชื้น
                    icon: mdi:water-percent
                  - entity: sensor.living_room_air_quality
                    name: Air ADC
                    icon: mdi:air-filter
                  - entity: sensor.living_room_ldr
                    name: LDR
                    icon: mdi:brightness-6
                  - entity: binary_sensor.living_room_motion
                    name: Motion
                    icon: mdi:motion-sensor
              - type: entities
                show_header_toggle: false
                entities:
                  - entity: light.livingroom_rgbw
                    name: 💡 ไฟ IKEA RGBW (Zigbee)
                    secondary_info: last-changed
                  - entity: switch.livingroom_fan_plug
                    name: 🌀 พัดลม (Zigbee Plug)
                    secondary_info: last-changed
                  - entity: switch.livingroom_purifier_plug
                    name: 🌬️ เครื่องฟอกอากาศ (Zigbee)
                    secondary_info: last-changed
                  - entity: binary_sensor.living_room_air_alert
                    name: ⚠️ Air Quality Alert
                    secondary_info: last-changed

          # ── BEDROOM + ENTRANCE ─────────────────────────────
          - type: vertical-stack
            cards:
              - type: markdown
                content: >
                  <div style="background:linear-gradient(135deg,#4a148c,#6a1b9a);padding:10px 14px;border-radius:10px 10px 0 0;margin-bottom:-2px;">
                    <div style="font-size:15px;font-weight:800;color:white;">🛏️ ห้องนอน & 🚪 ทางเข้า</div>
                    <div style="font-size:10px;color:#e1bee7;margin-top:2px;">Bedroom & Entrance</div>
                  </div>
              - type: glance
                show_name: true
                show_state: true
                columns: 5
                entities:
                  - entity: sensor.bedroom_temperature
                    name: อุณหภูมิ
                    icon: mdi:thermometer
                  - entity: sensor.bedroom_humidity
                    name: ความชื้น
                    icon: mdi:water-percent
                  - entity: sensor.bedroom_ldr
                    name: LDR
                    icon: mdi:brightness-6
                  - entity: binary_sensor.bedroom_presence
                    name: Presence
                    icon: mdi:motion-sensor
                  - entity: binary_sensor.front_door
                    name: ประตูหน้า
                    icon: mdi:door
              - type: entities
                show_header_toggle: false
                entities:
                  - entity: switch.bedroom_light
                    name: 💡 ไฟห้องนอน
                    secondary_info: last-changed
                  - entity: switch.bedroom_fan
                    name: 🌀 พัดลมห้องนอน
                    secondary_info: last-changed
                  - entity: cover.bedroom_curtain
                    name: 🪟 ม่านห้องนอน (Servo)
                    secondary_info: last-changed
                  - entity: binary_sensor.bedroom_fall_alert
                    name: 🚨 Fall Alert (LD2410)
                    secondary_info: last-changed

      # ── ROW 2: KITCHEN + BATHROOM ──────────────────────────────
      - type: horizontal-stack
        cards:

          # ── KITCHEN ────────────────────────────────────────
          - type: vertical-stack
            cards:
              - type: markdown
                content: >
                  <div style="background:linear-gradient(135deg,#e65100,#f57c00);padding:10px 14px;border-radius:10px 10px 0 0;margin-bottom:-2px;">
                    <div style="font-size:15px;font-weight:800;color:white;">🍳 ห้องครัว</div>
                    <div style="font-size:10px;color:#ffe0b2;margin-top:2px;">Kitchen</div>
                  </div>
              - type: glance
                show_name: true
                show_state: true
                columns: 3
                entities:
                  - entity: sensor.kitchen_temperature
                    name: อุณหภูมิ
                    icon: mdi:thermometer
                  - entity: sensor.kitchen_humidity
                    name: ความชื้น
                    icon: mdi:water-percent
                  - entity: sensor.kitchen_ldr
                    name: LDR
                    icon: mdi:brightness-6
              - type: gauge
                entity: sensor.kitchen_gas_lpg
                name: Gas Level (ADC)
                min: 0
                max: 4095
                severity:
                  green: 0
                  yellow: 1500
                  red: 2500
              - type: entities
                show_header_toggle: false
                entities:
                  - entity: switch.kitchen_light
                    name: 💡 ไฟห้องครัว
                    secondary_info: last-changed
                  - entity: switch.kitchen_fan
                    name: 💨 พัดลมระบายอากาศ
                    secondary_info: last-changed
                  - entity: switch.kitchen_stove
                    name: 🔥 เตา (Simulator)
                    secondary_info: last-changed
                  - entity: binary_sensor.kitchen_gas_alert
                    name: ⚠️ Gas Alert
                    secondary_info: last-changed

          # ── BATHROOM ───────────────────────────────────────
          - type: vertical-stack
            cards:
              - type: markdown
                content: >
                  <div style="background:linear-gradient(135deg,#006064,#00838f);padding:10px 14px;border-radius:10px 10px 0 0;margin-bottom:-2px;">
                    <div style="font-size:15px;font-weight:800;color:white;">🚿 ห้องน้ำ</div>
                    <div style="font-size:10px;color:#b2ebf2;margin-top:2px;">Bathroom</div>
                  </div>
              - type: glance
                show_name: true
                show_state: true
                columns: 3
                entities:
                  - entity: binary_sensor.bathroom_presence
                    name: Presence
                    icon: mdi:motion-sensor
                  - entity: binary_sensor.bathroom_fall_alert
                    name: Fall Alert
                    icon: mdi:human-cane
                  - entity: sensor.bathroom_ldr
                    name: LDR
                    icon: mdi:brightness-6
              - type: entities
                show_header_toggle: false
                entities:
                  - entity: switch.bathroom_light
                    name: 💡 ไฟห้องน้ำ (LD2410)
                    secondary_info: last-changed
                  - entity: binary_sensor.bathroom_water_leak
                    name: 💧 Water Leak (SNZB-05)
                    secondary_info: last-changed

      # ── ROW 3: GARDEN (full width) ─────────────────────────────
      - type: vertical-stack
        cards:
          - type: markdown
            content: >
              <div style="background:linear-gradient(135deg,#1b5e20,#2e7d32);padding:10px 14px;border-radius:10px 10px 0 0;margin-bottom:-2px;">
                <div style="font-size:15px;font-weight:800;color:white;">🌿 สวน</div>
                <div style="font-size:10px;color:#c8e6c9;margin-top:2px;">Garden</div>
              </div>
          - type: horizontal-stack
            cards:
              - type: gauge
                entity: sensor.garden_soil_moisture
                name: Soil Moisture (%)
                min: 0
                max: 100
                severity:
                  green: 60
                  yellow: 30
                  red: 0
              - type: entities
                show_header_toggle: false
                entities:
                  - entity: sensor.garden_soil_raw
                    name: 🔬 Soil Raw (ADC)
                    secondary_info: last-changed
                  - entity: switch.garden_water_pump
                    name: 💧 Water Pump (Auto)
                    secondary_info: last-changed
                  - entity: switch.garden_light
                    name: 💡 ไฟสวน
                    secondary_info: last-changed
                  - entity: switch.garden_pathway_light
                    name: 🔆 ไฟทางเดินสวน
                    secondary_info: last-changed

      # ── ROW 4: GARAGE (full width) ─────────────────────────────
      - type: vertical-stack
        cards:
          - type: markdown
            content: >
              <div style="background:linear-gradient(135deg,#37474f,#546e7a);padding:10px 14px;border-radius:10px 10px 0 0;margin-bottom:-2px;">
                <div style="font-size:15px;font-weight:800;color:white;">🚗 โรงรถ</div>
                <div style="font-size:10px;color:#cfd8dc;margin-top:2px;">Garage · ESP32 #5</div>
              </div>
          - type: horizontal-stack
            cards:
              - type: gauge
                entity: sensor.garage_smoke_lpg
                name: Smoke/Gas (ADC)
                min: 0
                max: 4095
                severity:
                  green: 0
                  yellow: 1500
                  red: 2500
              - type: entities
                show_header_toggle: false
                entities:
                  - entity: cover.garage_door
                    name: 🚗 ประตูโรงรถ (Servo)
                    secondary_info: last-changed
                  - entity: switch.garage_light
                    name: 💡 ไฟโรงรถ
                    secondary_info: last-changed
                  - entity: switch.garage_pathway_light
                    name: 🔆 ไฟทางเดินรถ
                    secondary_info: last-changed
                  - entity: binary_sensor.garage_smoke_alert
                    name: ⚠️ Smoke Alert (MQ-2)
                    secondary_info: last-changed
                  - entity: binary_sensor.garage_motion
                    name: 🚨 PIR Motion
                    secondary_info: last-changed
                  - entity: sensor.garage_ldr
                    name: 🔆 LDR (แสง)
                    secondary_info: last-changed

  # ══════════════════════════════════════════════════════════════
  # VIEW 3 — GRAPHS
  # ══════════════════════════════════════════════════════════════
  - title: กราฟ
    path: history
    icon: mdi:chart-line
    badges: []
    cards:

      # ── HEADER ──────────────────────────────────────────────────
      - type: markdown
        content: >
          <div style="text-align:center; padding:16px 12px 8px;">
            <div style="font-size:22px; font-weight:800; color:#e8eaf6; margin-bottom:4px;">📊 Sensor History</div>
            <div style="font-size:12px; color:#7c8db5; letter-spacing:2px; text-transform:uppercase;">Real-time Environmental Data</div>
            <div style="height:2px; background:linear-gradient(to right,transparent,#5c6bc0,#7986cb,#5c6bc0,transparent); margin:10px 0 4px;"></div>
          </div>

      # ── CURRENT VALUES (Snapshot) ────────────────────────────────
      - type: horizontal-stack
        cards:
          - type: sensor
            entity: sensor.living_room_temperature
            name: ห้องนั่งเล่น
            icon: mdi:thermometer
            graph: line
          - type: sensor
            entity: sensor.bedroom_temperature
            name: ห้องนอน
            icon: mdi:thermometer
            graph: line

      - type: horizontal-stack
        cards:
          - type: sensor
            entity: sensor.living_room_humidity
            name: LR ความชื้น
            icon: mdi:water-percent
            graph: line
          - type: sensor
            entity: sensor.kitchen_temperature
            name: Kitchen °C
            icon: mdi:thermometer
            graph: line
          - type: sensor
            entity: sensor.garden_soil_moisture
            name: ความชื้นดิน
            icon: mdi:sprout
            graph: line
          - type: sensor
            entity: sensor.kitchen_gas_lpg
            name: แก๊สครัว
            icon: mdi:gas-cylinder
            graph: line

      # ── TEMPERATURE GRAPH ─────────────────────────────────────────
      - type: history-graph
        title: 🌡️ อุณหภูมิ (°C) — ทุกห้อง
        hours_to_show: 24
        refresh_interval: 30
        entities:
          - entity: sensor.living_room_temperature
            name: ห้องนั่งเล่น
          - entity: sensor.bedroom_temperature
            name: ห้องนอน
          - entity: sensor.kitchen_temperature
            name: ห้องครัว

      # ── HUMIDITY GRAPH ────────────────────────────────────────────
      - type: history-graph
        title: 💧 ความชื้นอากาศ (%) — ทุกห้อง
        hours_to_show: 24
        refresh_interval: 30
        entities:
          - entity: sensor.living_room_humidity
            name: ห้องนั่งเล่น
          - entity: sensor.bedroom_humidity
            name: ห้องนอน
          - entity: sensor.kitchen_humidity
            name: ห้องครัว

      # ── SOIL MOISTURE GRAPH ───────────────────────────────────────
      - type: history-graph
        title: 🌱 ความชื้นดิน (%)
        hours_to_show: 24
        refresh_interval: 60
        entities:
          - entity: sensor.garden_soil_moisture
            name: สวน

      # ── GAS SENSOR GRAPH ──────────────────────────────────────────
      - type: history-graph
        title: 🚨 ระดับแก๊ส — ครัว & โรงรถ (ADC)
        hours_to_show: 24
        refresh_interval: 30
        entities:
          - entity: sensor.kitchen_gas_lpg
            name: ห้องครัว (MQ-2)
          - entity: sensor.garage_smoke_lpg
            name: โรงรถ (MQ-2)

  # ══════════════════════════════════════════════════════════════
  # VIEW 4 — PROJECT INFO
  # ══════════════════════════════════════════════════════════════
  - title: โปรเจค
    path: about
    icon: mdi:information-outline
    badges: []
    cards:

      - type: markdown
        content: >
          <div style="text-align:center;padding:28px 12px 16px;">
            <div style="font-size:56px;margin-bottom:12px;">🏠</div>
            <div style="font-size:24px;font-weight:900;color:#e8eaf6;margin-bottom:6px;letter-spacing:1px;">Smart Home <span style="color:#5c6bc0;">AIoT</span></div>
            <div style="font-size:14px;font-weight:700;color:#90caf9;margin-bottom:6px;">Development of a Home Automation System</div>
            <div style="font-size:11px;letter-spacing:3px;color:#64b5f6;text-transform:uppercase;margin-bottom:16px;">System Controlled by Mobile &amp; Voice Commands</div>
            <div style="height:2px;background:linear-gradient(to right,transparent,#5c6bc0,#7986cb,#5c6bc0,transparent);margin:12px 0 14px;"></div>
