title: Smart Home AIoT
views:
  - title: Overview
    path: overview
    icon: mdi:home
    type: sections
    max_columns: 4
    sections:

      # ── Section 1: Header + Mode + Weather ─────────────
      - type: grid
        cards:
          - type: markdown
            content: |
              # 🏠 Smart Home AIoT
              **ชาวี (Chawi)** — ผู้ช่วยบ้านอัจฉริยะ AI ภาษาไทย
              *Defense: 26 พฤษภาคม 2026*

          - type: tile
            entity: input_select.house_mode
            name: House Mode
            icon: mdi:home-account
            color: blue

          - type: tile
            entity: input_select.comfort_mode
            name: Comfort Mode
            icon: mdi:sofa
            color: purple

          - type: weather-forecast
            entity: weather.forecast_baan
            show_forecast: true
            show_current: true

      # ── Section 2: Alerts & Safety ─────────────────────
      - type: grid
        cards:
          - type: heading
            heading_style: title
            heading: 🚨 Alerts & Safety
            icon: mdi:shield-alert

          - type: tile
            entity: binary_sensor.kitchen_gas_alert
            name: แก๊สรั่ว / Gas
            color: red
            icon: mdi:gas-cylinder

          - type: tile
            entity: binary_sensor.bathroom_water_leak
            name: น้ำรั่ว / Water Leak
            color: blue
            icon: mdi:water-alert

          - type: tile
            entity: binary_sensor.bathroom_fall_alert
            name: ล้มห้องน้ำ / Bath Fall
            color: orange
            icon: mdi:account-alert

          - type: tile
            entity: binary_sensor.bedroom_fall_alert
            name: ล้มห้องนอน / Bed Fall
            color: orange
            icon: mdi:account-alert

          - type: tile
            entity: binary_sensor.garage_smoke_alert
            name: ควันโรงรถ / Garage Smoke
            color: red
            icon: mdi:smoke

          - type: tile
            entity: binary_sensor.living_room_air_alert
            name: อากาศเสีย / Air
            color: yellow
            icon: mdi:air-filter

          - type: tile
            entity: binary_sensor.front_door
            name: ประตูหน้า / Front Door
            color: indigo
            icon: mdi:door

      # ── Section 3: Lights ─────────────────────────────
      - type: grid
        cards:
          - type: heading
            heading_style: title
            heading: 💡 Lights
            icon: mdi:lightbulb-group

          - type: tile
            entity: switch.bedroom_light
            name: ห้องนอน / Bedroom
            color: amber

          - type: tile
            entity: light.living_room_light
            name: ห้องนั่งเล่น / Living Room
            color: amber
            features:
              - type: light-brightness

          - type: tile
            entity: switch.kitchen_light
            name: ครัว / Kitchen
            color: amber

          - type: tile
            entity: switch.bathroom_light
            name: ห้องน้ำ / Bathroom
            color: amber

          - type: tile
            entity: switch.garden_light_1
            name: สวน 1 / Garden 1
            color: green

          - type: tile
            entity: switch.garden_light_2
            name: สวน 2 / Garden 2
            color: green

          - type: tile
            entity: switch.garage_light
            name: โรงรถ / Garage
            color: amber

          - type: tile
            entity: switch.garage_pathway_light
            name: ทางเดิน / Pathway
            color: amber

      # ── Section 4: Climate Control ─────────────────────
      - type: grid
        cards:
          - type: heading
            heading_style: title
            heading: 🌪️ Climate Control
            icon: mdi:fan

          - type: tile
            entity: switch.bedroom_fan
            name: พัดลมห้องนอน
            color: cyan
            icon: mdi:fan

          - type: tile
            entity: switch.living_room_fan
            name: พัดลมห้องนั่งเล่น
            color: cyan
            icon: mdi:fan

          - type: tile
            entity: switch.kitchen_fan
            name: พัดลมระบายอากาศ
            color: cyan
            icon: mdi:fan

          - type: tile
            entity: switch.kitchen_stove
            name: เตาแก๊ส / Stove
            color: red
            icon: mdi:stove

          - type: tile
            entity: switch.garden_water_pump
            name: ปั๊มน้ำ / Pump
            color: blue
            icon: mdi:water-pump

      # ── Section 5: Doors & Covers ─────────────────────
      - type: grid
        cards:
          - type: heading
            heading_style: title
            heading: 🚪 Doors & Covers
            icon: mdi:door

          - type: tile
            entity: cover.bedroom_curtain
            name: ม่านห้องนอน
            color: purple
            features:
              - type: cover-open-close

          - type: tile
            entity: cover.garage_door
            name: ประตูโรงรถ
            color: purple
            features:
              - type: cover-open-close

          - type: tile
            entity: lock.front_door_lock
            name: ล็อคประตูหน้า
            color: purple
            icon: mdi:lock

      # ── Section 6: Climate Sensors ─────────────────────
      - type: grid
        cards:
          - type: heading
            heading_style: title
            heading: 🌡️ Climate Sensors
            icon: mdi:thermometer

          - type: tile
            entity: sensor.bedroom_temperature
            name: อุณหภูมิห้องนอน
            color: orange
            icon: mdi:thermometer

          - type: tile
            entity: sensor.living_room_temperature
            name: อุณหภูมิห้องนั่งเล่น
            color: orange
            icon: mdi:thermometer

          - type: tile
            entity: sensor.kitchen_temperature
            name: อุณหภูมิครัว
            color: orange
            icon: mdi:thermometer

          - type: tile
            entity: sensor.bedroom_humidity
            name: ความชื้นห้องนอน
            color: blue
            icon: mdi:water-percent

          - type: tile
            entity: sensor.living_room_humidity
            name: ความชื้นห้องนั่งเล่น
            color: blue
            icon: mdi:water-percent

          - type: tile
            entity: sensor.garden_soil_moisture
            name: ความชื้นดิน
            color: green
            icon: mdi:sprout

      # ── Section 7: Rooms (navigate to detail) ──────────
      - type: grid
        cards:
          - type: heading
            heading_style: title
            heading: 🏠 Rooms
            icon: mdi:floor-plan

          - type: area
            area: h_ngn_n
            navigation_path: /lovelace/bedroom

          - type: area
            area: h_ngnangeln
            navigation_path: /lovelace/living-room

          - type: area
            area: h_ngkhraw
            navigation_path: /lovelace/kitchen

          - type: area
            area: h_ngnmaa
            navigation_path: /lovelace/bathroom

          - type: area
            area: swn
            navigation_path: /lovelace/garden

          - type: area
            area: rongroth
            navigation_path: /lovelace/garage

          - type: area
            area: front_door
            navigation_path: /lovelace/front-door

      # ── Section 8: Zigbee Network ─────────────────────
      - type: grid
        cards:
          - type: heading
            heading_style: title
            heading: 📡 Zigbee Network
            icon: mdi:zigbee

          - type: tile
            entity: binary_sensor.zigbee2mqtt_bridge_connection_state
            name: Bridge Status
            icon: mdi:hub
            color: green

          - type: tile
            entity: switch.zigbee2mqtt_bridge_permit_join
            name: Permit Join
            icon: mdi:account-plus
            color: orange

          - type: tile
            entity: binary_sensor.living_room_motion
            name: Motion (ห้องนั่งเล่น)
            icon: mdi:motion-sensor

          - type: tile
            entity: sensor.livingroom_pir_battery
            name: Battery (Motion)
            icon: mdi:battery
            color: green

          - type: tile
            entity: sensor.bathroom_water_leak_battery
            name: Battery (Water Leak)
            icon: mdi:battery
            color: green
