# ============================================================
# Mosquitto MQTT Broker Config
# บันทึกไว้ที่: ./volumes/mosquitto/config/mosquitto.conf
# ============================================================

# ─── Listeners ───────────────────────────────────────────────
listener 1883                    # MQTT standard port
listener 9001                    # WebSocket port
protocol websockets

# ─── Persistence ─────────────────────────────────────────────
persistence true
persistence_location /mosquitto/data/

# ─── Logging ─────────────────────────────────────────────────
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information

# ─── Security ────────────────────────────────────────────────
# ไม่ต้องการ auth สำหรับ local network
allow_anonymous true

# ถ้าต้องการ auth — uncomment และสร้าง password file:
# allow_anonymous false
# password_file /mosquitto/config/passwd
# สร้าง password: mosquitto_passwd -c /mosquitto/config/passwd admin

# ─── Connection Limits ───────────────────────────────────────
max_connections 100
max_keepalive 60
