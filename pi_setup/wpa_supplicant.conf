country=TH
ctrl_interface=DIR=/var/run/wpa_supplicant GROUP=netdev
update_config=1

# ════════════════════════════════════════════════
# Pi WiFi Client — Smart Home AIoT
# ════════════════════════════════════════════════
# Pi เป็น dual-role:
#   wlan0 (client) = เชื่อม WiFi บ้าน "Chawee"  ← ไฟล์นี้
#   ap0    (AP)    = ปล่อย WiFi สำรอง "SmartHome-Local" ← ดู hostapd.conf
# ════════════════════════════════════════════════

# ─── Primary: WiFi router บ้าน ─────────────
network={
    ssid="Chawee"
    psk="YOUR_WIFI_PASSWORD"
    priority=10
    key_mgmt=WPA-PSK
}

